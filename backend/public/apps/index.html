<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMART Apps — Proxy Smart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'smart-blue': '#667eea',
            'smart-purple': '#764ba2',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out; }
    .app-card { transition: all 0.2s ease; }
    .app-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-smart-blue to-smart-purple flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-2xl animate-fade-in-up">
    <div class="text-center mb-8">
      <div class="inline-block p-3 bg-gradient-to-br from-smart-blue to-smart-purple rounded-full mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">SMART Apps</h1>
      <p class="text-gray-600 text-sm">Available SMART on FHIR applications</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

      <a href="/apps/dtr/" class="app-card block border border-gray-200 rounded-lg p-6 bg-white hover:border-smart-blue">
        <div class="flex items-center space-x-3 mb-3">
          <div class="p-2 bg-blue-100 rounded-lg">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <h2 class="text-lg font-semibold text-gray-800">DTR App</h2>
        </div>
        <p class="text-sm text-gray-600">Documentation, Templates & Rules — Prior Authorization workflow with questionnaire rendering.</p>
      </a>

      <a href="/apps/consent/" class="app-card block border border-gray-200 rounded-lg p-6 bg-white hover:border-smart-blue">
        <div class="flex items-center space-x-3 mb-3">
          <div class="p-2 bg-green-100 rounded-lg">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
          </div>
          <h2 class="text-lg font-semibold text-gray-800">Consent App</h2>
        </div>
        <p class="text-sm text-gray-600">Patient consent management — create, review and revoke FHIR Consent resources.</p>
      </a>

    </div>

    <div class="mt-8 pt-6 border-t border-gray-200 flex justify-between items-center text-sm text-gray-500">
      <a href="/" class="hover:text-smart-blue transition-colors">&larr; Launcher</a>
      <a href="/webapp/" class="hover:text-smart-blue transition-colors">Admin Dashboard &rarr;</a>
    </div>
  </div>
</body>
</html>
