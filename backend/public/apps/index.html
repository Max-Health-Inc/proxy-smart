<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMART Apps — Proxy Smart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'smart-blue': '#667eea',
            'smart-purple': '#764ba2',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out; }
    .app-card { transition: all 0.2s ease; }
    .app-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-smart-blue to-smart-purple flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-2xl animate-fade-in-up">
    <div class="text-center mb-8">
      <div class="inline-block p-3 bg-gradient-to-br from-smart-blue to-smart-purple rounded-full mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">SMART Apps</h1>
      <p class="text-gray-600 text-sm">Available SMART on FHIR applications</p>
    </div>

    <div id="apps-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="col-span-full text-center py-8 text-gray-400">
        <svg class="w-6 h-6 mx-auto animate-spin mb-2" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Discovering apps…
      </div>
    </div>

    <div class="mt-8 pt-6 border-t border-gray-200 flex justify-between items-center text-sm text-gray-500">
      <a href="/" class="hover:text-smart-blue transition-colors">&larr; Launcher</a>
      <a href="/webapp/" class="hover:text-smart-blue transition-colors">Admin Dashboard &rarr;</a>
    </div>
  </div>

  <script>
    const ICONS = {
      'document-text': '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>',
      'shield-check': '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>',
      'app-window': '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/>',
    };
    const COLORS = {
      clinical: { bg: 'bg-blue-100', text: 'text-blue-600' },
      administrative: { bg: 'bg-green-100', text: 'text-green-600' },
      other: { bg: 'bg-gray-100', text: 'text-gray-600' },
    };

    fetch('/apps.json')
      .then(r => r.json())
      .then(({ apps }) => {
        const grid = document.getElementById('apps-grid');
        if (!apps || apps.length === 0) {
          grid.innerHTML = '<p class="col-span-full text-center py-8 text-gray-400">No apps discovered.</p>';
          return;
        }
        grid.innerHTML = apps.map(app => {
          const c = COLORS[app.category] || COLORS.other;
          const iconPath = ICONS[app.icon] || ICONS['app-window'];
          return `
            <a href="${app.launch_url}" class="app-card block border border-gray-200 rounded-lg p-6 bg-white hover:border-smart-blue">
              <div class="flex items-center space-x-3 mb-3">
                <div class="p-2 ${c.bg} rounded-lg">
                  <svg class="w-6 h-6 ${c.text}" fill="none" stroke="currentColor" viewBox="0 0 24 24">${iconPath}</svg>
                </div>
                <div>
                  <h2 class="text-lg font-semibold text-gray-800">${app.client_name}</h2>
                  <span class="text-xs text-gray-400">${app.client_id}</span>
                </div>
              </div>
              <p class="text-sm text-gray-600">${app.description}</p>
              <div class="mt-3 flex flex-wrap gap-1">
                ${app.scope.split(' ').map(s => `<span class="inline-block text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">${s}</span>`).join('')}
              </div>
            </a>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('apps-grid').innerHTML =
          '<p class="col-span-full text-center py-8 text-red-400">Failed to load apps.</p>';
      });
  </script>
</body>
</html>
