<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/proxy-smart.svg" />
  <title>Apps — Proxy Smart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fg: #111; --muted: #888; --border: #e5e5e5;
      --primary: #00d294;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    html { min-height: 100%; }
    body {
      font-family: var(--font); color: var(--fg); background: #fafafa;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Top bar (matches AppHeader from shared-ui) ── */
    header {
      background: #fff; border-bottom: 1px solid var(--border);
    }
    .bar {
      max-width: 960px; width: 100%; margin: 0 auto;
      padding: .5rem .75rem; display: flex; align-items: center;
      justify-content: space-between; gap: .5rem;
    }
    @media (min-width: 640px) { .bar { padding: .75rem 1rem; } }
    .brand { display: flex; align-items: center; gap: .5rem; min-width: 0; }
    .brand img { height: 20px; width: auto; flex-shrink: 0; }
    @media (min-width: 640px) { .brand img { height: 24px; } }
    .brand span { font-size: .875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    @media (min-width: 640px) { .brand span { font-size: 1rem; } }
    .links { display: flex; align-items: center; gap: .25rem; flex-shrink: 0; }
    .links a {
      font-size: .875rem; color: var(--muted); font-weight: 300;
      padding: .25rem .75rem; border-radius: 6px;
      transition: background .15s, color .15s;
    }
    .links a:hover { background: rgba(0,0,0,.05); color: var(--fg); }

    /* ── Main ────────────────────────────────────── */
    main { flex: 1; max-width: 960px; width: 100%; margin: 0 auto; padding: 2rem 1.25rem 1.5rem; }

    /* ── Toolbar ─────────────────────────────────── */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.25rem;
    }
    .toolbar h1 { font-size: 1.15rem; font-weight: 500; }
    .toolbar .subtitle { font-size: .78rem; color: var(--muted); font-weight: 400; margin-top: 2px; }
    .size-toggle {
      display: flex; gap: 2px; background: #fff; border: 1px solid var(--border);
      border-radius: 6px; padding: 2px; overflow: hidden;
    }
    .size-toggle button {
      border: none; background: transparent; padding: 5px 10px;
      font-size: .7rem; color: var(--muted); border-radius: 4px;
      transition: all .15s;
    }
    .size-toggle button.active { background: var(--primary); color: #fff; }
    .size-toggle button:hover:not(.active) { background: #f0f0f0; }

    /* ── Store frame ─────────────────────────────── */
    .store-frame {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem; min-height: 420px;
    }
    .store-divider {
      height: 1px; margin: 1.5rem auto 0;
      background: radial-gradient(ellipse at center, #bbb 0%, var(--border) 50%, transparent 100%);
    }

    /* ── Grid ────────────────────────────────────── */
    .grid {
      display: grid;
      gap: 1.5rem 1rem;
    }
    .grid.sm  { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    .grid.md  { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    .grid.lg  { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

    .tile {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      text-decoration: none; color: inherit;
    }
    .icon {
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .tile:hover .icon { transform: scale(1.06); }
    .icon svg { stroke: currentColor; fill: none; }

    /* Size variants */
    .grid.sm .icon { width: 48px; height: 48px; border-radius: 12px; }
    .grid.sm .icon svg { width: 22px; height: 22px; }
    .grid.sm .label { font-size: .65rem; max-width: 80px; }

    .grid.md .icon { width: 64px; height: 64px; border-radius: 16px; }
    .grid.md .icon svg { width: 28px; height: 28px; }
    .grid.md .label { font-size: .75rem; max-width: 100px; }

    .grid.lg .icon { width: 88px; height: 88px; border-radius: 20px; }
    .grid.lg .icon svg { width: 36px; height: 36px; }
    .grid.lg .label { font-size: .8rem; max-width: 130px; }

    .label {
      text-align: center; line-height: 1.3;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* Color palette */
    .c0 { background: #dbeafe; color: #2563eb; }
    .c1 { background: #d1fae5; color: #059669; }
    .c2 { background: #ffedd5; color: #ea580c; }
    .c3 { background: #ede9fe; color: #7c3aed; }
    .c4 { background: #ffe4e6; color: #e11d48; }
    .c5 { background: #cffafe; color: #0891b2; }

    /* ── Pagination ──────────────────────────────── */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: .5rem; margin-top: 1.5rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .pagination button {
      border: 1px solid var(--border); background: #fff; border-radius: 6px;
      padding: 5px 12px; font-size: .75rem; color: var(--muted);
      transition: all .15s;
    }
    .pagination button:hover:not(:disabled) { border-color: #ccc; color: var(--fg); }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .pagination button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pagination .info { font-size: .7rem; color: var(--muted); }
    .pagination.hidden { display: none; }

    /* ── States ───────────────────────────────────── */
    .empty, .loading { text-align: center; color: var(--muted); font-size: .85rem; padding: 4rem 0; }
    .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--muted); border-radius: 50%; animation: s .5s linear infinite; margin: 0 auto .5rem; }
    @keyframes s { to { transform: rotate(360deg); } }

    /* ── Footer ──────────────────────────────────── */
    footer { padding: .5rem 1.25rem; text-align: center; font-size: .7rem; color: var(--muted); }

    @media (max-width: 480px) {
      main { padding: 1.25rem 1rem 2rem; }
      .store-frame { padding: 1rem; }
      .grid.sm  { grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); }
      .grid.md  { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
      .grid.lg  { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a href="/" class="brand"><img src="/proxy-smart.svg" alt="Proxy Smart"><span>Proxy Smart</span></a>
      <div class="links">
        <a href="/">Home</a>
        <a href="/webapp/" id="adminLink">Admin</a>
      </div>
      <script>if(window.__APP_STORE_HIDE_ADMIN__)document.getElementById('adminLink').style.display='none'</script>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div>
        <h1>Applications</h1>
        <p class="subtitle">Apps available on this platform</p>
      </div>
      <div class="size-toggle" id="sizeToggle">
        <button data-size="sm">S</button>
        <button data-size="md" class="active">M</button>
        <button data-size="lg">L</button>
      </div>
    </div>

    <div class="store-frame">
      <div class="grid md" id="g">
        <div class="loading" style="grid-column:1/-1"><div class="spin"></div>Loading&hellip;</div>
      </div>
      <div class="pagination hidden" id="pag"></div>
    </div>
    <div class="store-divider"></div>
  </main>

  <footer>&copy; <script>document.write(new Date().getFullYear())</script> Max Health Inc.</footer>

  <script>
    const ICONS = {
      'heart-pulse': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M19.5 12.572l-7.5 7.428-7.5-7.428A5 5 0 1112 6.006a5 5 0 017.5 6.572z"/><path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M5 12h2l2-3 3 6 2-3h2"/>',
      'document-text': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>',
      'shield-check': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>',
      'clipboard-list': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>',
      'app-window': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/>',
      'stethoscope': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M4.8 2.3A2 2 0 003 4.5v3A5.5 5.5 0 008.5 13h1a2.5 2.5 0 012.5 2.5v1a3 3 0 006 0v-1.8a5 5 0 00-4-4.9"/><circle cx="19" cy="9" r="2" stroke-width="1.5"/><path stroke-width="1.5" d="M7.2 2.3A2 2 0 018 4.5"/>',
      'syringe': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M18 2l4 4m-5.5.5L21 2M10 12l-2 2m6-6l-8 8-4 1 1-4 8-8m4-1l2 2"/>',
      'pill': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5l-8 8a4.24 4.24 0 006 6l8-8a4.24 4.24 0 00-6-6m-3 9l6-6"/>',
      'test-tube': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M14.5 2v17.5c0 1.4-1.1 2.5-2.5 2.5s-2.5-1.1-2.5-2.5V2m-2 0h9M9.5 13h5"/>',
      'microscope': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M6 18h8M3 22h18M14 2v7.5M9.5 16A6.5 6.5 0 0016 9.5V2H9v7.5A6.5 6.5 0 009.5 16z"/>',
      'user': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4" stroke-width="1.5"/>',
      'camera': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4" stroke-width="1.5"/>',
      'dna': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M2 15c6.667-6 13.333 0 20-6M9 3.236s1 0 3.5 2.764C15 8.764 16 12 16 12m0-8.764s-1 0-3.5 2.764C10 8.764 9 12 9 12m3 10c2.5-2.764 3.5-2.764 3.5-2.764M12 22c-2.5-2.764-3.5-2.764-3.5-2.764M2 9c6.667 6 13.333 0 20 6"/>',
      'phone': '<rect x="5" y="2" width="14" height="20" rx="2" ry="2" stroke-width="1.5"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="1.5"/>',
      'settings': '<circle cx="12" cy="12" r="3" stroke-width="1.5"/><path stroke-width="1.5" d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001.08 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.6.85 1 1.51 1.08H21a2 2 0 010 4h-.09c-.66.08-1.25.47-1.51 1.08z"/>',
      'folder': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>',
      'lock': '<rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-width="1.5"/><path stroke-width="1.5" d="M7 11V7a5 5 0 0110 0v4"/>',
      'lock-open': '<rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-width="1.5"/><path stroke-width="1.5" d="M7 11V7a5 5 0 019.9-1"/>',
      'chart': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M18 20V10m-6 10V4M6 20v-6"/>',
      'brain': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M12 2a5 5 0 00-4.78 3.52A4 4 0 004 9.5a4.5 4.5 0 00.96 7.77A4.5 4.5 0 009 22h6a4.5 4.5 0 004.04-4.73A4.5 4.5 0 0020 9.5a4 4 0 00-3.22-3.98A5 5 0 0012 2z"/>',
      'activity': '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>',
      'hospital': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-4h6v4m-3-8h.01M12 13h.01"/>',
      'scan': '<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M3 7V5a2 2 0 012-2h2m10 0h2a2 2 0 012 2v2m0 10v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10"/>',
    };
    const C = ['c0','c1','c2','c3','c4','c5'];
    const g = document.getElementById('g');
    const pag = document.getElementById('pag');
    const PER_PAGE = { sm: 24, md: 18, lg: 12 };

    let allApps = [];
    let size = localStorage.getItem('app-icon-size') || 'md';
    let page = 1;

    /* ── Size toggle ─────────────────────────────── */
    document.getElementById('sizeToggle').addEventListener('click', e => {
      const btn = e.target.closest('[data-size]');
      if (!btn) return;
      size = btn.dataset.size;
      localStorage.setItem('app-icon-size', size);
      document.querySelectorAll('#sizeToggle button').forEach(b => b.classList.toggle('active', b === btn));
      page = 1;
      render();
    });

    /* Restore saved size */
    if (size !== 'md') {
      document.querySelectorAll('#sizeToggle button').forEach(b => {
        b.classList.toggle('active', b.dataset.size === size);
      });
    }

    /* ── Render ───────────────────────────────────── */
    function render() {
      const perPage = PER_PAGE[size];
      const totalPages = Math.ceil(allApps.length / perPage);
      if (page > totalPages) page = totalPages || 1;

      const start = (page - 1) * perPage;
      const visible = allApps.slice(start, start + perPage);

      g.className = `grid ${size}`;
      g.innerHTML = visible.map((a, i) => {
        const idx = start + i;
        const svg = ICONS[a.icon] || ICONS['app-window'];
        return `<a href="${encodeURI(a.launch_url)}" class="tile" title="${(a.description||a.client_name).replace(/"/g,'&quot;')}">
          <div class="icon ${C[idx % 6]}"><svg viewBox="0 0 24 24">${svg}</svg></div>
          <span class="label">${a.client_name}</span></a>`;
      }).join('');

      /* Pagination */
      if (totalPages <= 1) {
        pag.className = 'pagination hidden';
        pag.innerHTML = '';
        return;
      }
      pag.className = 'pagination';
      let html = `<button id="prev" ${page <= 1 ? 'disabled' : ''}>&lsaquo; Prev</button>`;
      for (let p = 1; p <= totalPages; p++) {
        html += `<button class="pg ${p === page ? 'active' : ''}" data-page="${p}">${p}</button>`;
      }
      html += `<button id="next" ${page >= totalPages ? 'disabled' : ''}>Next &rsaquo;</button>`;
      pag.innerHTML = html;
    }

    /* Pagination clicks */
    pag.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn || btn.disabled) return;
      if (btn.id === 'prev') page--;
      else if (btn.id === 'next') page++;
      else if (btn.dataset.page) page = +btn.dataset.page;
      render();
      g.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    /* ── Load apps ────────────────────────────────── */
    const API_BASE = window.__APP_STORE_API_BASE__ || '';
    fetch(`${API_BASE}/apps.json`)
      .then(r => r.json())
      .then(({ apps }) => {
        if (!apps || !apps.length) {
          g.innerHTML = '<div class="empty" style="grid-column:1/-1">No apps available.</div>';
          return;
        }
        allApps = apps;
        render();
      })
      .catch(() => {
        g.innerHTML = '<div class="empty" style="grid-column:1/-1;color:#ef4444">Failed to load apps.</div>';
      });
  </script>
</body>
</html>
