# Automatically generate AI-powered summaries of code changes
# Runs on commits to develop branches and posts summary as commit comment
name: Diff Summary

on:
  push:
    branches:
      - develop
      - 'dev/**'
      - 'ai/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  summarize:
    name: Generate AI Summary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check if merge commit
      id: check_merge
      run: |
        PARENT_COUNT=$(git rev-list --parents -n 1 ${{ github.sha }} | awk '{print NF-1}')
        if [ "$PARENT_COUNT" -gt 1 ]; then
          echo "is_merge=true" >> $GITHUB_OUTPUT
          echo "⚠️  This is a merge commit - skipping AI summary"
        else
          echo "is_merge=false" >> $GITHUB_OUTPUT
          echo "✅ This is a regular commit - will generate AI summary"
        fi

    - name: Set up Python 3.11
      if: steps.check_merge.outputs.is_merge == 'false'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      if: steps.check_merge.outputs.is_merge == 'false'
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      if: steps.check_merge.outputs.is_merge == 'false'
      run: uv pip install --system openai

    - name: Determine diff refs
      if: steps.check_merge.outputs.is_merge == 'false'
      id: refs
      run: |
        if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
          echo "base_ref=origin/develop" >> $GITHUB_OUTPUT
          echo "head_ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "ℹ️  First commit on branch - comparing with develop"
        else
          echo "base_ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
          echo "head_ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "✅ Comparing with previous commit"
        fi

    - name: Generate summary
      if: steps.check_merge.outputs.is_merge == 'false'
      id: summary
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python scripts/workflows/summarize_diff.py \
          --base-ref "${{ steps.refs.outputs.base_ref }}" \
          --head-ref "${{ steps.refs.outputs.head_ref }}" \
          --max-chars 2000 > summary.txt

        echo "summary<<EOF" >> $GITHUB_OUTPUT
        cat summary.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Post commit comment
      if: steps.check_merge.outputs.is_merge == 'false'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('summary.txt', 'utf8');

          await github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: '${{ github.sha }}',
            body: `## 🤖 AI-Generated Commit Summary\n\n${summary}\n\n---\n*Generated by OpenAI GPT-5 nano based on code changes*`
          });

    - name: Print summary to logs
      if: steps.check_merge.outputs.is_merge == 'false'
      run: |
        echo "=========================================="
        echo "AI-GENERATED SUMMARY"
        echo "=========================================="
        cat summary.txt || echo "No summary generated"
        echo "=========================================="
