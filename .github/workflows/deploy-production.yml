name: Deploy Production

on:
  workflow_call:
    inputs:
      app_version:
        description: 'Version of the application to deploy'
        required: true
        type: string
      source_branch:
        description: 'Source branch for deployment'
        required: true
        type: string
    outputs:
      fhir_server_url:
        description: "FHIR server URL after deployment"
        value: ${{ jobs.deploy.outputs.fhir_server_url }}
      keycloak_url:
        description: "Keycloak URL after deployment"
        value: ${{ jobs.deploy.outputs.keycloak_url }}
      app_url:
        description: "Main application URL after deployment"
        value: ${{ jobs.deploy.outputs.app_url }}
      deployment_status:
        description: "Status of the deployment"
        value: ${{ jobs.deploy.outputs.deployment_status }}
      deployment_target:
        description: "Target platform where app was deployed"
        value: ${{ jobs.deploy.outputs.deployment_target }}
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      VITE_ENCRYPTION_SECRET:
        required: true

  workflow_dispatch:
    inputs:
      app_version:
        description: 'Version to deploy (defaults to latest)'
        required: false
        default: 'latest'
      source_branch:
        description: 'Branch to deploy from'
        required: false
        default: 'main'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: proxy-smart-backend
  ECS_CLUSTER: proxy-smart-production
  ECS_SERVICE: proxy-smart-backend
  PRODUCTION_URL: https://proxy-smart.com
  API_URL: https://api.proxy-smart.com
  KEYCLOAK_URL: https://auth.proxy-smart.com

jobs:
  deploy:
    name: Build, Push & Deploy to AWS ECS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      fhir_server_url: ${{ steps.outputs.outputs.fhir_server_url }}
      keycloak_url: ${{ steps.outputs.outputs.keycloak_url }}
      app_url: ${{ steps.outputs.outputs.app_url }}
      deployment_status: ${{ steps.outputs.outputs.deployment_status }}
      deployment_target: ${{ steps.outputs.outputs.deployment_target }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.app_version }}
          build-args: |
            VITE_ENCRYPTION_SECRET=${{ secrets.VITE_ENCRYPTION_SECRET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force new ECS deployment
        run: |
          echo "🚀 Forcing new deployment on ECS service..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --query 'service.deployments[0].id' \
            --output text

      - name: Wait for ECS service stability
        run: |
          echo "⏳ Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
          echo "✅ ECS service is stable"

      - name: Verify deployment health
        run: |
          echo "🏥 Checking deployment health..."
          MAX_RETRIES=10
          RETRY_DELAY=15

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.API_URL }}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              HEALTH_RESPONSE=$(curl -s "${{ env.API_URL }}/health")
              echo "Response: $HEALTH_RESPONSE"
              exit 0
            fi
            echo "⏳ Health check returned $HTTP_STATUS, retrying in ${RETRY_DELAY}s... (attempt $i/$MAX_RETRIES)"
            sleep $RETRY_DELAY
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Set deployment outputs
        id: outputs
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "fhir_server_url=${{ env.API_URL }}/proxy-smart-backend/hapi-fhir-server/R4" >> $GITHUB_OUTPUT
            echo "keycloak_url=${{ env.KEYCLOAK_URL }}" >> $GITHUB_OUTPUT
            echo "app_url=${{ env.PRODUCTION_URL }}" >> $GITHUB_OUTPUT
            echo "deployment_status=success" >> $GITHUB_OUTPUT
            echo "deployment_target=aws" >> $GITHUB_OUTPUT
          else
            echo "fhir_server_url=" >> $GITHUB_OUTPUT
            echo "keycloak_url=${{ env.KEYCLOAK_URL }}" >> $GITHUB_OUTPUT
            echo "app_url=${{ env.PRODUCTION_URL }}" >> $GITHUB_OUTPUT
            echo "deployment_status=failed" >> $GITHUB_OUTPUT
            echo "deployment_target=aws" >> $GITHUB_OUTPUT
          fi

