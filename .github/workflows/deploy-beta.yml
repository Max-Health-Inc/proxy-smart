name: Deploy Beta

on:
  workflow_call:
    inputs:
      app_version:
        description: 'Version of the application to deploy'
        required: true
        type: string
      source_branch:
        description: 'Source branch for deployment'
        required: true
        type: string
    outputs:
      fhir_server_url:
        description: "FHIR server URL after deployment"
        value: ${{ jobs.deploy.outputs.fhir_server_url }}
      keycloak_url:
        description: "Keycloak URL after deployment"
        value: ${{ jobs.deploy.outputs.keycloak_url }}
      app_url:
        description: "Main application URL after deployment"
        value: ${{ jobs.deploy.outputs.app_url }}
      deployment_status:
        description: "Status of the deployment"
        value: ${{ jobs.deploy.outputs.deployment_status }}
      deployment_target:
        description: "Target platform where app was deployed"
        value: ${{ jobs.deploy.outputs.deployment_target }}
    secrets:
      VPS_SSH_KEY:
        required: true
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      BETA_POSTGRES_PASSWORD:
        required: true
      BETA_KEYCLOAK_ADMIN_PASSWORD:
        required: true
      BETA_KEYCLOAK_ADMIN_CLIENT_SECRET:
        required: true
      VITE_ENCRYPTION_SECRET:
        required: true
      OPENAI_API_KEY:
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ── Build images on GA runners (7 GB RAM) and push to GHCR ──
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:beta-${{ inputs.app_version }}
            ${{ env.IMAGE_PREFIX }}/backend:beta-latest
          cache-from: type=gha,scope=beta-backend
          cache-to: type=gha,mode=max,scope=beta-backend

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ui
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:beta-${{ inputs.app_version }}
            ${{ env.IMAGE_PREFIX }}/frontend:beta-latest
          build-args: |
            VITE_ENCRYPTION_SECRET=${{ secrets.VITE_ENCRYPTION_SECRET }}
            VITE_BASE=/webapp/
          cache-from: type=gha,scope=beta-frontend
          cache-to: type=gha,mode=max,scope=beta-frontend

      - name: Build & push keycloak image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.keycloak
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/keycloak:beta-${{ inputs.app_version }}
            ${{ env.IMAGE_PREFIX }}/keycloak:beta-latest
          cache-from: type=gha,scope=beta-keycloak
          cache-to: type=gha,mode=max,scope=beta-keycloak

      - name: Verify no localhost in backend image
        run: |
          echo "🔍 Checking production bundles for hardcoded localhost references..."
          docker pull ${{ env.IMAGE_PREFIX }}/backend:beta-${{ inputs.app_version }}
          CID=$(docker create ${{ env.IMAGE_PREFIX }}/backend:beta-${{ inputs.app_version }})
          MATCHES=$(docker export "$CID" | tar -t 2>/dev/null | head -1 > /dev/null && \
            docker cp "$CID":/app/backend/public/apps /tmp/apps 2>/dev/null && \
            grep -rl 'localhost:8445' /tmp/apps/ 2>/dev/null || true)
          docker rm "$CID" > /dev/null

          if [ -n "$MATCHES" ]; then
            echo "::error::Found hardcoded localhost:8445 in production bundles:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ No localhost references found in production bundles"

  # ── Pull pre-built images on VPS and restart services ──
  deploy:
    name: Deploy Beta (VPS – Docker Compose)
    needs: build-images
    runs-on: ubuntu-latest
    outputs:
      fhir_server_url: ${{ steps.deploy.outputs.fhir_server_url }}
      keycloak_url: ${{ steps.deploy.outputs.keycloak_url }}
      app_url: ${{ steps.deploy.outputs.app_url }}
      deployment_status: ${{ steps.deploy.outputs.deployment_status }}
      deployment_target: ${{ steps.deploy.outputs.deployment_target }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Docker Compose
        id: deploy
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          BETA_POSTGRES_PASSWORD: ${{ secrets.BETA_POSTGRES_PASSWORD }}
          BETA_KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.BETA_KEYCLOAK_ADMIN_PASSWORD }}
          BETA_KEYCLOAK_ADMIN_CLIENT_SECRET: ${{ secrets.BETA_KEYCLOAK_ADMIN_CLIENT_SECRET }}
          VITE_ENCRYPTION_SECRET: ${{ secrets.VITE_ENCRYPTION_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "🚀 Deploying Beta v${{ inputs.app_version }} to VPS (pre-built GHCR images)..."

          DEPLOY_DIR="/opt/proxy-smart-beta"
          VPS_URL="https://beta.proxy-smart.com"
          IMAGE_TAG="beta-${{ inputs.app_version }}"
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 ${VPS_USER}@${VPS_HOST}"

          # Ensure deploy directory and repo exist on VPS
          ${SSH_CMD} "
            if [ ! -d ${DEPLOY_DIR}/.git ]; then
              sudo mkdir -p ${DEPLOY_DIR}
              sudo chown \$(whoami):\$(whoami) ${DEPLOY_DIR}
              git clone --branch ${{ inputs.source_branch }} \
                https://github.com/${{ github.repository }}.git ${DEPLOY_DIR}
            fi
          "

          # Clean up unused Docker resources to prevent disk-full failures
          ${SSH_CMD} "
            echo '🧹 Cleaning up unused Docker resources...'
            docker image prune -af --filter 'until=168h' 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true
            docker builder prune -af --keep-storage=512mb 2>/dev/null || true
            echo \"📊 Disk usage: \$(df -h / | tail -1 | awk '{print \$5}') used\"
          "

          # Write env file from CI secrets
          printf '%s\n' \
            "POSTGRES_PASSWORD=${BETA_POSTGRES_PASSWORD}" \
            "KC_DB_PASSWORD=${BETA_POSTGRES_PASSWORD}" \
            "KEYCLOAK_ADMIN_PASSWORD=${BETA_KEYCLOAK_ADMIN_PASSWORD}" \
            "KEYCLOAK_ADMIN_CLIENT_SECRET=${BETA_KEYCLOAK_ADMIN_CLIENT_SECRET}" \
            "VITE_ENCRYPTION_SECRET=${VITE_ENCRYPTION_SECRET}" \
            "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            "BACKEND_IMAGE=${{ env.IMAGE_PREFIX }}/backend:${IMAGE_TAG}" \
            "FRONTEND_IMAGE=${{ env.IMAGE_PREFIX }}/frontend:${IMAGE_TAG}" \
            "KEYCLOAK_IMAGE=${{ env.IMAGE_PREFIX }}/keycloak:${IMAGE_TAG}" \
          | ${SSH_CMD} "cat > ${DEPLOY_DIR}/.env.beta && chmod 600 ${DEPLOY_DIR}/.env.beta"

          # Pull latest compose files, pull pre-built images, restart
          ${SSH_CMD} "
            set -e
            cd ${DEPLOY_DIR}
            git fetch origin
            git checkout ${{ inputs.source_branch }}
            git pull origin ${{ inputs.source_branch }}

            # Log in to GHCR for pulling images
            echo '${GH_TOKEN}' | docker login ghcr.io -u '${GH_ACTOR}' --password-stdin

            # Ensure shared Caddy proxy is running
            docker network create caddy 2>/dev/null || true
            docker rm -f caddy-proxy 2>/dev/null || true
            docker compose -p caddy-proxy -f docker-compose.caddy.yml up -d

            echo '📦 Pulling pre-built images and restarting beta stack...'
            docker compose -f docker-compose.beta.yml --env-file .env.beta pull
            docker compose -f docker-compose.beta.yml --env-file .env.beta up -d --remove-orphans

            echo '⏳ Waiting for services to become healthy...'
            # Wait for postgres health check
            for i in \$(seq 1 30); do
              if docker compose -f docker-compose.beta.yml --env-file .env.beta exec -T postgres pg_isready -U postgres -d keycloak >/dev/null 2>&1; then
                echo '  ✅ Postgres ready'
                break
              fi
              sleep 2
            done

            # Wait for backend health endpoint
            for i in \$(seq 1 60); do
              if docker compose -f docker-compose.beta.yml --env-file .env.beta exec -T backend curl -sf http://localhost:8445/health >/dev/null 2>&1; then
                echo '  ✅ Backend ready'
                break
              fi
              sleep 5
            done
          "

          # External health check through Caddy
          echo "⏳ Verifying external access at ${VPS_URL}..."
          for i in $(seq 1 30); do
            if curl -sf "${VPS_URL}/health" > /dev/null 2>&1; then
              echo "✅ External health check passed"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ External health check failed after 30 attempts"
              echo "deployment_status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
            sleep 10
          done

          # Set outputs
          echo "fhir_server_url=${VPS_URL}/proxy-smart-backend/hapi-fhir-server/R4" >> $GITHUB_OUTPUT
          echo "keycloak_url=${VPS_URL}/auth" >> $GITHUB_OUTPUT
          echo "app_url=${VPS_URL}" >> $GITHUB_OUTPUT
          echo "deployment_status=success" >> $GITHUB_OUTPUT
          echo "deployment_target=vps" >> $GITHUB_OUTPUT

          echo "✅ Beta deployment completed successfully"
          echo "📍 App:       ${VPS_URL}"
          echo "📍 FHIR:      ${VPS_URL}/proxy-smart-backend/hapi-fhir-server/R4"
          echo "📍 Keycloak:  ${VPS_URL}/auth"
