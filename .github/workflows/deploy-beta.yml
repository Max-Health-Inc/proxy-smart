name: Deploy Beta

on:
  workflow_call:
    inputs:
      app_version:
        description: 'Version of the application to deploy'
        required: true
        type: string
      source_branch:
        description: 'Source branch for deployment'
        required: true
        type: string
    outputs:
      fhir_server_url:
        description: "FHIR server URL after deployment"
        value: ${{ jobs.deploy.outputs.fhir_server_url }}
      keycloak_url:
        description: "Keycloak URL after deployment"
        value: ${{ jobs.deploy.outputs.keycloak_url }}
      app_url:
        description: "Main application URL after deployment"
        value: ${{ jobs.deploy.outputs.app_url }}
      deployment_status:
        description: "Status of the deployment"
        value: ${{ jobs.deploy.outputs.deployment_status }}
      deployment_target:
        description: "Target platform where app was deployed"
        value: ${{ jobs.deploy.outputs.deployment_target }}
    secrets:
      VPS_SSH_KEY:
        required: true
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      BETA_POSTGRES_PASSWORD:
        required: true
      BETA_KEYCLOAK_ADMIN_PASSWORD:
        required: true
      BETA_KEYCLOAK_ADMIN_CLIENT_SECRET:
        required: true
      BETA_SHL_EXCHANGE_CLIENT_SECRET:
        required: false
      VITE_ENCRYPTION_SECRET:
        required: true
      BETA_ORTHANC_PASSWORD:
        required: true
      OPENAI_API_KEY:
        required: false
      RESEND_API_KEY:
        required: false
      GH_PAT:
        description: 'PAT with repo scope for checking out private app repos'
        required: true

  workflow_dispatch:
    inputs:
      app_version:
        description: 'Version to deploy (leave empty to re-deploy beta-latest)'
        required: false
        default: ''
      source_branch:
        description: 'Branch to checkout deploy files from'
        required: false
        default: 'test'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_DIR: /opt/proxy-smart-beta
  VPS_URL: https://beta.proxy-smart.com

jobs:
  # ── Build images on GA runners and push to GHCR (skip for re-deploys) ──
  build-images:
    name: Build & Push Images
    if: inputs.app_version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # ── Build standalone apps from private repos ──
      - name: Checkout consent-app
        uses: actions/checkout@v6
        with:
          repository: Max-Health-Inc/consent-app
          token: ${{ secrets.GH_PAT }}
          path: _standalone/consent-app

      - name: Checkout dtr-app
        uses: actions/checkout@v6
        with:
          repository: Max-Health-Inc/dtr-app
          token: ${{ secrets.GH_PAT }}
          path: _standalone/dtr-app

      - name: Checkout patient-portal
        uses: actions/checkout@v6
        with:
          repository: Max-Health-Inc/patient-portal
          token: ${{ secrets.GH_PAT }}
          path: _standalone/patient-portal

      - name: Build standalone apps (same-origin for VPS)
        run: |
          for app in consent-app dtr-app patient-portal; do
            echo "🔨 Building ${app}..."
            cd _standalone/${app}
            bun install
            VITE_PROXY_BASE='' bun run build
            cd ../..
          done

      - name: Inject app builds into backend/public/apps
        run: |
          rm -rf backend/public/apps/consent backend/public/apps/dtr backend/public/apps/patient-portal
          cp -r _standalone/consent-app/dist backend/public/apps/consent
          cp -r _standalone/dtr-app/dist backend/public/apps/dtr
          cp -r _standalone/patient-portal/dist backend/public/apps/patient-portal
          # Preserve smart-manifest.json if not in dist
          for app in consent-app dtr-app patient-portal; do
            target=$(echo $app | sed 's/-app//')
            [ "$app" = "patient-portal" ] && target="patient-portal"
            if [ -f "_standalone/${app}/smart-manifest.json" ] && [ ! -f "backend/public/apps/${target}/smart-manifest.json" ]; then
              cp "_standalone/${app}/smart-manifest.json" "backend/public/apps/${target}/"
            fi
          done
          echo "✅ Standalone apps built and injected"
          ls -la backend/public/apps/

      - name: Compute image prefix (GHCR requires lowercase)
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build & push backend image
        timeout-minutes: 20
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:beta-${{ inputs.app_version }}
            ${{ env.IMAGE_PREFIX }}/backend:beta-latest
          build-args: |
            VITE_ENCRYPTION_SECRET=${{ secrets.VITE_ENCRYPTION_SECRET }}
          cache-from: type=gha,scope=beta-backend-v2
          cache-to: type=gha,mode=max,scope=beta-backend-v2

      - name: Build & push keycloak image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.keycloak
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/keycloak:beta-${{ inputs.app_version }}
            ${{ env.IMAGE_PREFIX }}/keycloak:beta-latest
          cache-from: type=gha,scope=beta-keycloak
          cache-to: type=gha,mode=max,scope=beta-keycloak

  # ── Deploy to VPS via SSH ──
  deploy:
    name: Deploy Beta (VPS – Docker Compose)
    needs: [build-images]
    if: always() && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      fhir_server_url: ${{ steps.outputs.outputs.fhir_server_url }}
      keycloak_url: ${{ steps.outputs.outputs.keycloak_url }}
      app_url: ${{ steps.outputs.outputs.app_url }}
      deployment_status: ${{ steps.outputs.outputs.deployment_status }}
      deployment_target: ${{ steps.outputs.outputs.deployment_target }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch }}

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          echo "SSH_CMD=ssh ${SSH_OPTS} ${VPS_USER}@${VPS_HOST}" >> $GITHUB_ENV
          echo "SCP_CMD=scp ${SSH_OPTS}" >> $GITHUB_ENV
          echo "VPS_TARGET=${VPS_USER}@${VPS_HOST}" >> $GITHUB_ENV

      - name: Compute image tag
        run: |
          echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          if [ -n "${{ inputs.app_version }}" ]; then
            echo "IMAGE_TAG=beta-${{ inputs.app_version }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=beta-latest" >> $GITHUB_ENV
          fi

      - name: Prepare VPS
        env:
          BETA_POSTGRES_PASSWORD: ${{ secrets.BETA_POSTGRES_PASSWORD }}
          BETA_KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.BETA_KEYCLOAK_ADMIN_PASSWORD }}
          BETA_KEYCLOAK_ADMIN_CLIENT_SECRET: ${{ secrets.BETA_KEYCLOAK_ADMIN_CLIENT_SECRET }}
          BETA_SHL_EXCHANGE_CLIENT_SECRET: ${{ secrets.BETA_SHL_EXCHANGE_CLIENT_SECRET }}
          VITE_ENCRYPTION_SECRET: ${{ secrets.VITE_ENCRYPTION_SECRET }}
          BETA_ORTHANC_PASSWORD: ${{ secrets.BETA_ORTHANC_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "🚀 Deploying Beta v${{ inputs.app_version || 'latest' }} to VPS..."

          # Create deploy directory
          ${SSH_CMD} "sudo mkdir -p ${DEPLOY_DIR} && sudo chown \$(whoami):\$(whoami) ${DEPLOY_DIR}"

          # Generate proxy signing key (stable across deploys)
          ${SSH_CMD} "
            if [ ! -f ${DEPLOY_DIR}/proxy-signing-key.pem ]; then
              echo '🔑 Generating proxy signing key...'
              openssl genrsa -out ${DEPLOY_DIR}/proxy-signing-key.pem 2048
            else
              echo '🔑 Proxy signing key already exists — reusing'
            fi
            chmod 644 ${DEPLOY_DIR}/proxy-signing-key.pem
          "

          # Copy deploy files to VPS
          ${SCP_CMD} docker-compose.beta.yml ${VPS_TARGET}:${DEPLOY_DIR}/
          ${SCP_CMD} docker-compose.caddy.yml ${VPS_TARGET}:${DEPLOY_DIR}/
          ${SCP_CMD} scripts/seed/fhir-seed-bundle.json ${VPS_TARGET}:${DEPLOY_DIR}/fhir-seed-bundle.json
          ${SCP_CMD} scripts/seed/seed-dicom.sh ${VPS_TARGET}:${DEPLOY_DIR}/seed-dicom.sh
          ${SCP_CMD} .github/scripts/deploy-beta-remote.sh ${VPS_TARGET}:${DEPLOY_DIR}/deploy-beta-remote.sh
          ${SSH_CMD} "chmod +x ${DEPLOY_DIR}/seed-dicom.sh ${DEPLOY_DIR}/deploy-beta-remote.sh && mkdir -p ${DEPLOY_DIR}/dicom"

          # Copy DICOM files if present
          if [ -d scripts/seed/dicom ] && ls scripts/seed/dicom/*.dcm 1>/dev/null 2>&1; then
            ${SCP_CMD} scripts/seed/dicom/*.dcm ${VPS_TARGET}:${DEPLOY_DIR}/dicom/
          fi

          ${SSH_CMD} "mkdir -p ${DEPLOY_DIR}/keycloak/database"
          ${SCP_CMD} keycloak/database/init.sql ${VPS_TARGET}:${DEPLOY_DIR}/keycloak/database/init.sql

          # Clean up unused Docker resources
          ${SSH_CMD} "
            echo '🧹 Cleaning up unused Docker resources...'
            docker image prune -af --filter 'until=72h' 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
            echo \"📊 Disk usage: \$(df -h / | tail -1 | awk '{print \$5}') used\"
            DISK_PCT=\$(df / | tail -1 | awk '{print \$5}' | tr -d '%')
            if [ \"\$DISK_PCT\" -gt 85 ]; then
              echo '⚠️  Disk usage >85%, running aggressive cleanup...'
              docker system prune -af 2>/dev/null || true
              echo \"📊 Disk after cleanup: \$(df -h / | tail -1 | awk '{print \$5}') used\"
            fi
          "

          # Write env file from CI secrets
          printf '%s\n' \
            "POSTGRES_PASSWORD=${BETA_POSTGRES_PASSWORD}" \
            "KC_DB_PASSWORD=${BETA_POSTGRES_PASSWORD}" \
            "KEYCLOAK_ADMIN_PASSWORD=${BETA_KEYCLOAK_ADMIN_PASSWORD}" \
            "KEYCLOAK_ADMIN_CLIENT_SECRET=${BETA_KEYCLOAK_ADMIN_CLIENT_SECRET}" \
            "SHL_EXCHANGE_CLIENT_SECRET=${BETA_SHL_EXCHANGE_CLIENT_SECRET}" \
            "VITE_ENCRYPTION_SECRET=${VITE_ENCRYPTION_SECRET}" \
            "ORTHANC_PASSWORD=${BETA_ORTHANC_PASSWORD}" \
            "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            "RESEND_API_KEY=${RESEND_API_KEY}" \
            "BACKEND_IMAGE=${IMAGE_PREFIX}/backend:${IMAGE_TAG}" \
            "KEYCLOAK_IMAGE=${IMAGE_PREFIX}/keycloak:${IMAGE_TAG}" \
          | ${SSH_CMD} "cat > ${DEPLOY_DIR}/.env.beta && chmod 600 ${DEPLOY_DIR}/.env.beta"

      - name: Run deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          ${SSH_CMD} "DEPLOY_DIR='${DEPLOY_DIR}' GH_TOKEN='${GH_TOKEN}' GH_ACTOR='${GH_ACTOR}' RESEND_API_KEY='${RESEND_API_KEY:-}' bash '${DEPLOY_DIR}/deploy-beta-remote.sh'"

      - name: Verify deployment
        id: outputs
        run: |
          echo "⏳ Verifying external access at ${VPS_URL}..."
          for i in $(seq 1 30); do
            if curl -sf --connect-timeout 10 --max-time 15 "${VPS_URL}/health" > /dev/null 2>&1; then
              echo "✅ External health check passed"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ External health check failed after 30 attempts"
              echo "deployment_status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
            sleep 10
          done

          echo "fhir_server_url=${VPS_URL}/proxy-smart-backend/hapi-fhir-server/R4" >> $GITHUB_OUTPUT
          echo "keycloak_url=${VPS_URL}/auth" >> $GITHUB_OUTPUT
          echo "app_url=${VPS_URL}" >> $GITHUB_OUTPUT
          echo "deployment_status=success" >> $GITHUB_OUTPUT
          echo "deployment_target=vps" >> $GITHUB_OUTPUT

          echo "✅ Beta deployment completed"
          echo "📍 App:       ${VPS_URL}"
          echo "📍 FHIR:      ${VPS_URL}/proxy-smart-backend/hapi-fhir-server/R4"
          echo "📍 Keycloak:  ${VPS_URL}/auth"
