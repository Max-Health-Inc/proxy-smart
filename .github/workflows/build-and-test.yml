name: Build & Test

on:
  push:
    branches:
      - "dev/*"
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      run_tests:
        description: "Whether to run tests"
        required: false
        type: boolean
        default: true
      fail_on_test_failure:
        description: "Whether to fail the workflow if tests fail"
        required: false
        type: boolean
        default: true
    outputs:
      backend_success:
        description: "Whether backend build was successful"
        value: ${{ jobs.build-and-test.outputs.backend_success }}
      frontend_success:
        description: "Whether frontend build was successful"
        value: ${{ jobs.build-and-test.outputs.frontend_success }}
      backend_tests_success:
        description: "Whether backend tests were successful"
        value: ${{ jobs.build-and-test.outputs.backend_tests_success }}
      frontend_tests_success:
        description: "Whether frontend tests were successful"
        value: ${{ jobs.build-and-test.outputs.frontend_tests_success }}

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      backend_success: ${{ steps.backend-build.outcome == 'success' || steps.backend-build-heal.outputs.fixed == 'true' }}
      frontend_success: ${{ steps.frontend-build.outcome == 'success' || steps.frontend-build-heal.outputs.fixed == 'true' }}
      backend_tests_success: ${{ steps.backend-test.outcome == 'success' || steps.backend-test-heal.outputs.fixed == 'true' || (inputs.run_tests != true && inputs.run_tests != null) }}
      frontend_tests_success: ${{ steps.frontend-test.outcome == 'success' || steps.frontend-test-heal.outputs.fixed == 'true' || (inputs.run_tests != true && inputs.run_tests != null) }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Bun
      uses: ./.github/actions/setup-bun-version

    # Install Dependencies
    - name: Install Dependencies (Workspace)
      run: |
        echo "📦 Installing all dependencies via workspace..."
        bun install

    # === BACKEND BUILD ===
    - name: Build Backend
      run: |
        echo "🔨 Building backend..."
        cd backend
        bun run build
    
    - name: Generate Client APIs
      run: |
        echo "🔨 Generating client APIs..."
        pip install --break-system-packages openapi-ts-fetch==0.2.2
        bun run generate:ui

    # === FRONTEND BUILD ===
    - name: Build Frontend
      env:
        TAILWIND_DISABLE_LIGHTNINGCSS: "1"
        VITE_ENCRYPTION_SECRET: ${{ secrets.VITE_ENCRYPTION_SECRET }}
      run: |
        echo "🔨 Building frontend..."
        cd frontend/ui
        bun run build

    # === BACKEND TESTS ===
    - name: Test Backend
      if: ${{ inputs.run_tests == true || inputs.run_tests == null }}
      run: |
        echo "🧪 Testing backend..."
        cd backend
        # Run test files in a fixed (alphabetical) order rather than relying on
        # bun's default filesystem-readdir order, which differs between Linux
        # (CI, hash order) and dev machines (NTFS ~alphabetical). Bun's
        # mock.module() is process-global and persists across files, so a file
        # that mocks a shared module (e.g. @/lib/auth) can leak into a later
        # file that tests the real one. Alphabetical order deterministically
        # keeps each "victim" file (auth-audience-binding, access-control-factory)
        # before the files that mock its dependencies.
        bun test $(find test -name '*.test.ts' | sort)

    # === FRONTEND TESTS ===
    - name: Test Frontend
      if: ${{ inputs.run_tests == true || inputs.run_tests == null }}
      env:
        TAILWIND_DISABLE_LIGHTNINGCSS: "1"
      run: |
        echo "🧪 Testing frontend..."
        cd frontend/ui
        bun run test --run

    - name: Upload Build Artifacts
      if: ${{ !startsWith(github.ref, 'refs/heads/dev/') }}
      uses: actions/upload-artifact@v7
      with:
        name: build-artifacts
        path: |
          backend/dist
          frontend/ui/dist
        retention-days: 7
