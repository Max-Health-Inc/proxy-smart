name: Alpha Release

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'ui/src/lib/api-client/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  packages: write

concurrency:
  group: releases-alpha
  cancel-in-progress: false

jobs:
  alpha-release:
    name: Alpha Release
    # Only run if the last commit is not a release commit to avoid infinite loops
    if: ${{ !contains(github.event.head_commit.message, '🔄 Update version') && !contains(github.event.head_commit.message, '🤖 Update client APIs') && !contains(github.event.head_commit.message, 'Alpha release') && !contains(github.event.head_commit.message, '🚀') && !contains(github.event.head_commit.message, 'proxy-smart-releaser') }}
    uses: ./.github/workflows/release-orchestrator.yml
    with:
      release_type: 'alpha'
      source_branch: 'develop'
      target_branch: 'develop'
      should_bump_version: true
      is_prerelease: true
    secrets: inherit

  # Note: Deployment is handled automatically by Northflank
  # Northflank pulls the pre-built image from GHCR instead of building from source
  build-alpha-image:
    name: Build & Push Alpha Image
    needs: [alpha-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build & push mono image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mono
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/mono:alpha-${{ needs.alpha-release.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/mono:alpha-latest
          cache-from: type=gha,scope=alpha-mono
          cache-to: type=gha,mode=max,scope=alpha-mono

