name: SMART Compliance Tests (Inferno)

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'smart_stu2_2'
        type: choice
        options:
          - smart_stu2_2
          - smart_stu2
          - smart_stu1
      test_stage:
        description: 'Test stage config to use'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - alpha
          - beta
          - production
  
  # Called by other workflows (alpha, beta, production releases)
  workflow_call:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        type: string
        default: 'smart_stu2_2'
      test_stage:
        description: 'Test stage config to use'
        required: false
        type: string
        default: 'alpha'
    outputs:
      passed:
        description: 'Number of passed tests'
        value: ${{ jobs.smart-compliance-test.outputs.passed }}
      failed:
        description: 'Number of failed tests'
        value: ${{ jobs.smart-compliance-test.outputs.failed }}
      status:
        description: 'Overall test status'
        value: ${{ jobs.smart-compliance-test.outputs.status }}
  
  # Feature branches - test with local CI stack
  # NOTE: 'test' and 'main' are intentionally excluded here because their
  # release workflows (release-beta.yml, release-production.yml) call
  # testing-strategy.yml → smart-compliance-tests.yml AFTER deployment.
  # Running compliance tests directly on push would race against deployment
  # and hit a 503 because the new code isn't deployed yet.
  # NOTE: 'develop' is excluded because alpha is a dev-only release with no live deployment.
  push:
    branches:
      - 'dev/*'
      - 'develop/*'
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - 'lib/**'
      - 'apps/**'
      - 'Dockerfile'
      - 'Dockerfile.keycloak'
      - 'package.json'
      - 'keycloak/**'
      - 'testing/**'
      - '.github/workflows/smart-compliance-tests.yml'
  
  # Scheduled weekly run
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC

# Cancel previous compliance test runs for the same trigger, but don't block releases
concurrency:
  group: compliance-tests-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: write  # Required to commit test reports

env:
  # Determine test stage based on branch
  # dev/* and develop/* -> dev (local)
  # test -> beta (VPS)
  # main -> production (AWS)
  TEST_STAGE: ${{ 
    (startsWith(github.ref, 'refs/heads/dev/') || startsWith(github.ref, 'refs/heads/develop/')) && 'dev' ||
    github.ref == 'refs/heads/test' && 'beta' ||
    github.ref == 'refs/heads/main' && 'production' ||
    inputs.test_stage || 'dev' }}

jobs:
  smart-compliance-test:
    name: SMART ${{ inputs.test_suite || 'STU2.2' }} Compliance (${{ inputs.test_stage || (startsWith(github.ref, 'refs/heads/dev/') || startsWith(github.ref, 'refs/heads/develop/')) && 'dev' || github.ref == 'refs/heads/develop' && 'alpha' || github.ref == 'refs/heads/test' && 'beta' || github.ref == 'refs/heads/main' && 'production' || 'dev' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip bot/releaser version-bump commits to avoid duplicate runs
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, '🔄 Update version') && !contains(github.event.head_commit.message, '🤖 Update client APIs') && !contains(github.event.head_commit.message, 'proxy-smart-releaser')) }}
    
    outputs:
      passed: ${{ steps.inferno-tests.outputs.passed }}
      failed: ${{ steps.inferno-tests.outputs.failed }}
      status: ${{ steps.inferno-tests.outcome }}
    
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: keycloak
          POSTGRES_PASSWORD: keycloak
          POSTGRES_DB: keycloak
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      # Redis for Inferno (Sidekiq job queue)
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      
      # HAPI FHIR Server - standard R4 test server
      # Note: HAPI takes ~35 seconds to start. We use a simple TCP check.
      hapi-fhir:
        image: hapiproject/hapi:v8.6.0-1
        ports:
          - 8081:8080
        env:
          hapi.fhir.default_encoding: json
          hapi.fhir.fhir_version: R4

    steps:
      # Generate GitHub App token to bypass branch protection for committing reports
      # Note: This may fail if the GitHub App is not installed on the repository's organization
      - name: Generate token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Load test configuration
        id: config
        run: |
          CONFIG_FILE="testing/${{ env.TEST_STAGE }}/inferno-config.json"
          echo "Loading config from: $CONFIG_FILE"
          
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: Config file not found: $CONFIG_FILE"
            exit 1
          fi
          
          # Determine if testing local or deployed
          TARGET=$(jq -r '.target // "local"' "$CONFIG_FILE")
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          
          # Extract values from config
          INFERNO_URL=$(jq -r '.inferno.url' "$CONFIG_FILE")
          TEST_SUITE=$(jq -r '.inferno.test_suite // "smart_stu2_2"' "$CONFIG_FILE")
          CLIENT_ID=$(jq -r '.client.client_id' "$CONFIG_FILE")
          KC_USERNAME=$(jq -r '.test_user.username' "$CONFIG_FILE")
          KC_PASSWORD=$(jq -r '.test_user.password' "$CONFIG_FILE")
          KC_REALM=$(jq -r '.keycloak.realm' "$CONFIG_FILE")
          
          # Handle both local (port) and deployed (url) configs
          if [ "$TARGET" = "deployed" ]; then
            BACKEND_URL=$(jq -r '.backend.url' "$CONFIG_FILE")
            KC_URL=$(jq -r '.keycloak.url' "$CONFIG_FILE")
            FHIR_URL=$(jq -r '.fhir_server.url' "$CONFIG_FILE")
            echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
            echo "kc_url=$KC_URL" >> $GITHUB_OUTPUT
            echo "fhir_url=$FHIR_URL" >> $GITHUB_OUTPUT
          else
            KC_PORT=$(jq -r '.keycloak.port' "$CONFIG_FILE")
            BACKEND_PORT=$(jq -r '.backend.port' "$CONFIG_FILE")
            FHIR_PORT=$(jq -r '.fhir_server.port' "$CONFIG_FILE")
            echo "kc_port=$KC_PORT" >> $GITHUB_OUTPUT
            echo "backend_port=$BACKEND_PORT" >> $GITHUB_OUTPUT
            echo "fhir_port=$FHIR_PORT" >> $GITHUB_OUTPUT
          fi
          
          # Override test_suite if provided via input
          if [ -n "${{ inputs.test_suite }}" ]; then
            TEST_SUITE="${{ inputs.test_suite }}"
          fi
          
          # Set outputs for later steps
          echo "inferno_url=$INFERNO_URL" >> $GITHUB_OUTPUT
          echo "test_suite=$TEST_SUITE" >> $GITHUB_OUTPUT
          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "kc_username=$KC_USERNAME" >> $GITHUB_OUTPUT
          echo "kc_password=$KC_PASSWORD" >> $GITHUB_OUTPUT
          echo "kc_realm=$KC_REALM" >> $GITHUB_OUTPUT
          echo "kc_port=$KC_PORT" >> $GITHUB_OUTPUT
          echo "backend_port=$BACKEND_PORT" >> $GITHUB_OUTPUT
          echo "fhir_port=$FHIR_PORT" >> $GITHUB_OUTPUT
          
          echo "✓ Configuration loaded from $CONFIG_FILE"
          echo "  Test Suite: $TEST_SUITE"
          echo "  Client ID: $CLIENT_ID"
          echo "  Keycloak Realm: $KC_REALM"

      # Cache Docker images to speed up workflow (only for local targets)
      - name: Cache Docker images
        if: steps.config.outputs.target != 'deployed'
        uses: actions/cache@v5
        id: docker-cache
        with:
          path: /tmp/docker-images
          key: docker-images-keycloak-26.6.1

      - name: Load cached Docker images
        if: steps.config.outputs.target != 'deployed' && steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          if [ -f /tmp/docker-images/keycloak.tar ]; then
            echo "Loading cached Keycloak image..."
            docker load -i /tmp/docker-images/keycloak.tar
            echo "✓ Keycloak image loaded from cache"
          fi

      - name: Pull and cache Keycloak image
        if: steps.config.outputs.target != 'deployed' && steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          echo "Pulling Keycloak image (will be cached for next run)..."
          docker pull quay.io/keycloak/keycloak:26.6.1
          mkdir -p /tmp/docker-images
          docker save quay.io/keycloak/keycloak:26.6.1 -o /tmp/docker-images/keycloak.tar
          echo "✓ Keycloak image pulled and saved for caching"

      - name: Setup Bun
        if: steps.config.outputs.target != 'deployed'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        if: steps.config.outputs.target != 'deployed'
        run: bun install

      - name: Build Backend
        if: steps.config.outputs.target != 'deployed'
        run: |
          cd backend
          bun run build

      # Start Keycloak with realm import (only for local targets)
      - name: Start Keycloak
        if: steps.config.outputs.target != 'deployed'
        run: |
          # Copy realm export to a temp location for mounting
          mkdir -p /tmp/keycloak-import
          cp keycloak/realm-export.json /tmp/keycloak-import/
          
          docker run -d \
            --name keycloak \
            --network host \
            -v /tmp/keycloak-import:/opt/keycloak/data/import \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            -e KC_DB=postgres \
            -e KC_DB_URL=jdbc:postgresql://localhost:5432/keycloak \
            -e KC_DB_USERNAME=keycloak \
            -e KC_DB_PASSWORD=keycloak \
            -e KC_HEALTH_ENABLED=true \
            -e KC_HTTP_ENABLED=true \
            -e KC_HOSTNAME_STRICT=false \
            quay.io/keycloak/keycloak:26.6.1 \
            start-dev --import-realm
          
          # Wait for Keycloak to be ready
          # Note: Health endpoints return 404 in dev mode, check the realm endpoint instead
          echo "Waiting for Keycloak..."
          for i in {1..60}; do
            # Check if Keycloak is responding on the master realm
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/realms/master 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Keycloak is ready! (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $i/60... (HTTP $HTTP_CODE)"
            sleep 2
          done
          
          # Verify realm was imported
          sleep 5
          echo "Checking realm..."
          TOKEN=$(curl -s -X POST "http://localhost:8080/realms/master/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password&client_id=admin-cli&username=admin&password=admin" | jq -r '.access_token')
          
          REALMS=$(curl -s "http://localhost:8080/admin/realms" -H "Authorization: Bearer $TOKEN" | jq -r '.[].realm')
          echo "Available realms: $REALMS"
          
          if echo "$REALMS" | grep -q "proxy-smart"; then
            echo "✓ proxy-smart realm found!"
          else
            echo "ERROR: proxy-smart realm not found! Check realm-export.json import."
            docker logs keycloak | tail -50
            exit 1
          fi

      # Wait for HAPI FHIR to be ready (takes ~35 seconds to start) - only for local targets
      - name: Wait for HAPI FHIR
        if: steps.config.outputs.target != 'deployed'
        run: |
          echo "Waiting for HAPI FHIR server to be ready..."
          for i in {1..60}; do
            if curl -sf http://localhost:8081/fhir/metadata > /dev/null 2>&1; then
              echo "✓ HAPI FHIR is ready!"
              curl -s http://localhost:8081/fhir/metadata | jq -r '.fhirVersion' | xargs -I{} echo "  FHIR Version: {}"
              exit 0
            fi
            echo "Attempt $i/60 - waiting for HAPI FHIR..."
            sleep 2
          done
          echo "ERROR: HAPI FHIR failed to start in time"
          exit 1

      # Seed HAPI FHIR with test resources required for fhirUser claim validation (only for local targets)
      - name: Seed FHIR Test Resources
        if: steps.config.outputs.target != 'deployed'
        run: |
          echo "Seeding HAPI FHIR with test resources..."
          
          # Create Practitioner resource for fhirUser claim
          # This matches the fhirUser claim in Keycloak realm-export.json
          curl -sf -X PUT "http://localhost:8081/fhir/Practitioner/example-practitioner" \
            -H "Content-Type: application/fhir+json" \
            -d '{
              "resourceType": "Practitioner",
              "id": "example-practitioner",
              "identifier": [{
                "system": "http://example.org/practitioners",
                "value": "doctor"
              }],
              "active": true,
              "name": [{
                "family": "Doctor",
                "given": ["Test"],
                "prefix": ["Dr."]
              }],
              "telecom": [{
                "system": "email",
                "value": "doctor@example.com"
              }]
            }' && echo "✓ Created Practitioner/example-practitioner"
          
          # Create a test Patient for launch/patient scope
          curl -sf -X PUT "http://localhost:8081/fhir/Patient/test-patient" \
            -H "Content-Type: application/fhir+json" \
            -d '{
              "resourceType": "Patient",
              "id": "test-patient",
              "identifier": [{
                "system": "http://example.org/patients",
                "value": "12345"
              }],
              "active": true,
              "name": [{
                "family": "Test",
                "given": ["Patient"]
              }],
              "gender": "unknown",
              "birthDate": "1990-01-01"
            }' && echo "✓ Created Patient/test-patient"
          
          echo "✓ FHIR test resources seeded successfully"

      # Start the application (only for local targets - deployed targets use remote backend)
      - name: Start Application
        if: steps.config.outputs.target != 'deployed'
        run: |
          cd backend
          bun run start &
          APP_PID=$!
          echo "app_pid=$APP_PID" >> $GITHUB_ENV
          
          # Wait for app to be ready
          echo "Waiting for application..."
          for i in {1..30}; do
            if curl -sf http://localhost:8445/health; then
              echo "Application is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
        env:
          NODE_ENV: production
          KEYCLOAK_BASE_URL: http://localhost:8080
          KEYCLOAK_REALM: proxy-smart
          KEYCLOAK_ADMIN_CLIENT_ID: admin-service
          KEYCLOAK_ADMIN_CLIENT_SECRET: admin-service-secret
          SHL_EXCHANGE_CLIENT_ID: shl-exchange
          SHL_EXCHANGE_CLIENT_SECRET: shl-exchange-dev-secret
          # Point to HAPI FHIR server running in GitHub Actions service container
          FHIR_SERVER_BASE: http://localhost:8081/fhir
          # Allow Inferno test runner origin for CORS compliance tests
          CORS_ORIGINS: http://localhost:4567,http://localhost:8445,http://localhost:5173
          LOG_LEVEL: debug

      # For deployed targets, verify the remote services are reachable
      - name: Verify Deployed Services
        if: steps.config.outputs.target == 'deployed'
        run: |
          echo "=== Verifying deployed services ==="
          
          BACKEND_URL="${{ steps.config.outputs.backend_url }}"
          KC_URL="${{ steps.config.outputs.kc_url }}"
          KC_REALM="${{ steps.config.outputs.kc_realm }}"
          
          echo "Backend: $BACKEND_URL"
          echo "Keycloak: $KC_URL"
          echo "Realm: $KC_REALM"
          
          # Check backend health (with retries — deployed service may be cold-starting)
          echo "Checking backend health..."
          BACKEND_OK=false
          for i in $(seq 1 20); do
            if curl -sf --max-time 10 "$BACKEND_URL/health" > /dev/null 2>&1; then
              echo "✓ Backend is healthy (attempt $i)"
              BACKEND_OK=true
              break
            fi
            echo "  Attempt $i/20 — not ready, waiting 10s..."
            sleep 10
          done
          if [ "$BACKEND_OK" = "false" ]; then
            echo "ERROR: Backend not reachable at $BACKEND_URL/health after 20 attempts"
            echo "Make sure the deployed service is running"
            exit 1
          fi
          
          # Check Keycloak realm (with retries)
          echo "Checking Keycloak realm..."
          KC_OK=false
          for i in $(seq 1 20); do
            if curl -sf --max-time 10 "$KC_URL/realms/$KC_REALM" > /dev/null 2>&1; then
              echo "✓ Keycloak realm $KC_REALM is accessible (attempt $i)"
              KC_OK=true
              break
            fi
            echo "  Attempt $i/20 — not ready, waiting 10s..."
            sleep 10
          done
          if [ "$KC_OK" = "false" ]; then
            echo "ERROR: Keycloak realm not reachable at $KC_URL/realms/$KC_REALM after 20 attempts"
            echo "Make sure Keycloak is scaled up and realm exists"
            exit 1
          fi
          
          # Export URLs for later steps
          echo "DEPLOYED_BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV
          echo "DEPLOYED_KC_URL=$KC_URL" >> $GITHUB_ENV
          echo "DEPLOYED_KC_REALM=$KC_REALM" >> $GITHUB_ENV

      # Ensure inferno-test-client and SMART scopes exist on deployed Keycloak
      - name: Ensure Inferno Test Client (Deployed)
        if: steps.config.outputs.target == 'deployed'
        run: |
          KC_URL="${{ steps.config.outputs.kc_url }}"
          KC_REALM="${{ steps.config.outputs.kc_realm }}"
          CLIENT_ID="${{ steps.config.outputs.client_id }}"
          
          # Get admin token via admin-service client (client_credentials grant)
          ADMIN_TOKEN=$(curl -sf -X POST "$KC_URL/realms/$KC_REALM/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=admin-service" \
            -d "client_secret=${{ secrets.KC_ADMIN_SERVICE_SECRET || 'admin-service-secret' }}" \
            | jq -r '.access_token')
          
          if [ -z "$ADMIN_TOKEN" ] || [ "$ADMIN_TOKEN" = "null" ]; then
            echo "WARNING: Could not get admin token — trying master realm admin"
            ADMIN_TOKEN=$(curl -sf -X POST "$KC_URL/realms/master/protocol/openid-connect/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=password" \
              -d "client_id=admin-cli" \
              -d "username=admin" \
              -d "password=admin" | jq -r '.access_token')
          fi
          
          if [ -z "$ADMIN_TOKEN" ] || [ "$ADMIN_TOKEN" = "null" ]; then
            echo "WARNING: Cannot authenticate to Keycloak admin API"
            echo "  inferno-test-client may not exist — OAuth tests will likely fail"
            exit 0
          fi
          
          echo "✓ Keycloak admin token obtained"
          
          # ── Step 1: Ensure SMART client scopes exist ──
          # These scopes are imported from realm-export.json for local but don't exist on deployed
          SMART_SCOPES='["launch/patient","fhirUser","patient/*.read","offline_access"]'
          
          for SCOPE_NAME in "launch/patient" "fhirUser" "patient/*.read" "offline_access"; do
            # URL-encode the scope name for the query
            ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SCOPE_NAME', safe=''))")
            
            EXISTING=$(curl -sf "$KC_URL/admin/realms/$KC_REALM/client-scopes" \
              -H "Authorization: Bearer $ADMIN_TOKEN" | jq -r --arg name "$SCOPE_NAME" '.[] | select(.name == $name) | .id')
            
            if [ -n "$EXISTING" ]; then
              echo "  ✓ Scope '$SCOPE_NAME' already exists (id: $EXISTING)"
            else
              echo "  Creating scope '$SCOPE_NAME'..."
              
              # Build scope definition based on name
              SCOPE_DEF="{\"name\": \"$SCOPE_NAME\", \"protocol\": \"openid-connect\", \"attributes\": {\"include.in.token.scope\": \"true\", \"display.on.consent.screen\": \"true\"}}"
              
              # fhirUser needs a protocol mapper to include the claim
              if [ "$SCOPE_NAME" = "fhirUser" ]; then
                SCOPE_DEF="{
                  \"name\": \"fhirUser\",
                  \"protocol\": \"openid-connect\",
                  \"attributes\": {\"include.in.token.scope\": \"true\", \"display.on.consent.screen\": \"true\"},
                  \"protocolMappers\": [{
                    \"name\": \"fhirUser-mapper\",
                    \"protocol\": \"openid-connect\",
                    \"protocolMapper\": \"oidc-usermodel-attribute-mapper\",
                    \"consentRequired\": false,
                    \"config\": {
                      \"userinfo.token.claim\": \"true\",
                      \"user.attribute\": \"fhirUser\",
                      \"id.token.claim\": \"true\",
                      \"access.token.claim\": \"true\",
                      \"claim.name\": \"fhirUser\",
                      \"jsonType.label\": \"String\"
                    }
                  }]
                }"
              fi
              
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$KC_URL/admin/realms/$KC_REALM/client-scopes" \
                -H "Authorization: Bearer $ADMIN_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$SCOPE_DEF")
              
              if [ "$HTTP_CODE" = "201" ]; then
                echo "  ✓ Created scope '$SCOPE_NAME'"
              else
                echo "  WARNING: Failed to create scope '$SCOPE_NAME' (HTTP $HTTP_CODE)"
              fi
            fi
          done
          
          # ── Step 2: Ensure inferno-test-client exists ──
          EXISTING=$(curl -sf "$KC_URL/admin/realms/$KC_REALM/clients?clientId=$CLIENT_ID" \
            -H "Authorization: Bearer $ADMIN_TOKEN" | jq 'length')
          
          CLIENT_DEF="{
            \"clientId\": \"$CLIENT_ID\",
            \"name\": \"Inferno Test Client\",
            \"protocol\": \"openid-connect\",
            \"clientAuthenticatorType\": \"client-dummy\",
            \"publicClient\": true,
            \"bearerOnly\": false,
            \"consentRequired\": false,
            \"standardFlowEnabled\": true,
            \"implicitFlowEnabled\": false,
            \"directAccessGrantsEnabled\": true,
            \"serviceAccountsEnabled\": false,
            \"authorizationServicesEnabled\": false,
            \"redirectUris\": [\"http://localhost:4567/*\", \"http://localhost:4567/custom/smart_stu2_2/redirect\", \"http://localhost:4567/custom/smart_stu2/redirect\"],
            \"webOrigins\": [\"http://localhost:4567\", \"*\"],
            \"fullScopeAllowed\": true,
            \"defaultClientScopes\": [\"web-origins\", \"acr\", \"profile\", \"roles\", \"email\", \"openid\"],
            \"attributes\": {\"pkce.code.challenge.method\": \"S256\", \"use.refresh.tokens\": \"true\", \"oauth2.device.authorization.grant.enabled\": \"false\", \"oidc.ciba.grant.enabled\": \"false\", \"backchannel.logout.session.required\": \"true\"}
          }"
          
          if [ "$EXISTING" -gt 0 ]; then
            # Delete and recreate to ensure clean state (PUT can leave stale settings)
            INTERNAL_ID=$(curl -sf "$KC_URL/admin/realms/$KC_REALM/clients?clientId=$CLIENT_ID" \
              -H "Authorization: Bearer $ADMIN_TOKEN" | jq -r '.[0].id')
            echo "Deleting existing $CLIENT_ID (internal: $INTERNAL_ID) for clean recreation..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "$KC_URL/admin/realms/$KC_REALM/clients/$INTERNAL_ID" \
              -H "Authorization: Bearer $ADMIN_TOKEN")
            echo "  Delete response: HTTP $HTTP_CODE"
          fi
          
          echo "Creating $CLIENT_ID..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$KC_URL/admin/realms/$KC_REALM/clients" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$CLIENT_DEF")
          if [ "$HTTP_CODE" = "201" ]; then
            echo "  ✓ Created $CLIENT_ID (HTTP $HTTP_CODE)"
          else
            echo "  ✗ Failed to create $CLIENT_ID (HTTP $HTTP_CODE)"
            # Show error for debugging
            curl -s -X POST "$KC_URL/admin/realms/$KC_REALM/clients" \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$CLIENT_DEF" | jq '.' 2>/dev/null || true
          fi
          
          # ── Step 3: Assign SMART scopes to the client as optional client scopes ──
          INTERNAL_ID=$(curl -sf "$KC_URL/admin/realms/$KC_REALM/clients?clientId=$CLIENT_ID" \
            -H "Authorization: Bearer $ADMIN_TOKEN" | jq -r '.[0].id')
          
          if [ -z "$INTERNAL_ID" ] || [ "$INTERNAL_ID" = "null" ]; then
            echo "WARNING: Could not find client internal ID"
            exit 0
          fi
          
          echo "Assigning SMART scopes to $CLIENT_ID (internal: $INTERNAL_ID)..."
          
          # Get current optional scopes for the client
          CURRENT_SCOPES=$(curl -sf "$KC_URL/admin/realms/$KC_REALM/clients/$INTERNAL_ID/optional-client-scopes" \
            -H "Authorization: Bearer $ADMIN_TOKEN" | jq -r '.[].name' 2>/dev/null)
          
          for SCOPE_NAME in "launch/patient" "fhirUser" "patient/*.read" "offline_access"; do
            if echo "$CURRENT_SCOPES" | grep -qF "$SCOPE_NAME"; then
              echo "  ✓ Scope '$SCOPE_NAME' already assigned"
            else
              # Get scope ID
              SCOPE_ID=$(curl -sf "$KC_URL/admin/realms/$KC_REALM/client-scopes" \
                -H "Authorization: Bearer $ADMIN_TOKEN" | jq -r --arg name "$SCOPE_NAME" '.[] | select(.name == $name) | .id')
              
              if [ -n "$SCOPE_ID" ] && [ "$SCOPE_ID" != "null" ]; then
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                  "$KC_URL/admin/realms/$KC_REALM/clients/$INTERNAL_ID/optional-client-scopes/$SCOPE_ID" \
                  -H "Authorization: Bearer $ADMIN_TOKEN")
                if [ "$HTTP_CODE" = "204" ]; then
                  echo "  ✓ Assigned scope '$SCOPE_NAME' to client"
                else
                  echo "  WARNING: Failed to assign scope '$SCOPE_NAME' (HTTP $HTTP_CODE)"
                fi
              else
                echo "  WARNING: Scope '$SCOPE_NAME' not found in realm"
              fi
            fi
          done
          
          echo "✓ Inferno test client configured with SMART scopes"
          
          # ── Step 4: Verify client configuration ──
          echo ""
          echo "Verifying client configuration..."
          CLIENT_CONFIG=$(curl -sf "$KC_URL/admin/realms/$KC_REALM/clients/$INTERNAL_ID" \
            -H "Authorization: Bearer $ADMIN_TOKEN")
          echo "  publicClient: $(echo $CLIENT_CONFIG | jq '.publicClient')"
          echo "  consentRequired: $(echo $CLIENT_CONFIG | jq '.consentRequired')"
          echo "  standardFlowEnabled: $(echo $CLIENT_CONFIG | jq '.standardFlowEnabled')"
          echo "  directAccessGrantsEnabled: $(echo $CLIENT_CONFIG | jq '.directAccessGrantsEnabled')"
          echo "  redirectUris: $(echo $CLIENT_CONFIG | jq -c '.redirectUris')"
          echo "  pkce.code.challenge.method: $(echo $CLIENT_CONFIG | jq -r '.attributes["pkce.code.challenge.method"]')"
          
          # ── Step 5: Quick token test via direct access grant ──
          echo ""
          echo "Testing token endpoint (direct access grant)..."
          if [ "${{ steps.config.outputs.target }}" = "deployed" ]; then
            BASE_URL="${{ steps.config.outputs.backend_url }}"
          else
            BASE_URL="http://localhost:${{ steps.config.outputs.backend_port }}"
          fi
          TOKEN_RESP=$(curl -s -w "\n%{http_code}" -X POST "$BASE_URL/auth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password&client_id=$CLIENT_ID&username=${{ steps.config.outputs.kc_username }}&password=${{ steps.config.outputs.kc_password }}&scope=openid")
          TOKEN_HTTP=$(echo "$TOKEN_RESP" | tail -1)
          TOKEN_BODY=$(echo "$TOKEN_RESP" | head -n -1)
          if [ "$TOKEN_HTTP" = "200" ]; then
            echo "  ✓ Token exchange works (HTTP $TOKEN_HTTP)"
            echo "  has access_token: $(echo $TOKEN_BODY | jq 'has("access_token")')"
          else
            echo "  ✗ Token exchange FAILED (HTTP $TOKEN_HTTP)"
            echo "  Error: $(echo $TOKEN_BODY | jq -r '.error // .message // "unknown"')"
            echo "  Description: $(echo $TOKEN_BODY | jq -r '.error_description // "none"')"
          fi

      # Setup Node.js for Playwright
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          # Install Playwright in a separate directory to avoid workspace package.json issues
          mkdir -p /tmp/playwright-setup
          cd /tmp/playwright-setup
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
          # Copy playwright to workspace node_modules for script access
          mkdir -p $GITHUB_WORKSPACE/node_modules
          cp -r node_modules/playwright* $GITHUB_WORKSPACE/node_modules/ || true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Resolve Inferno Version
        id: inferno-version
        run: |
          # Pin to v0.6.4 — last known working release.
          # v1.0.0 (inferno_core 1.0.2) changed DB/migration internals and breaks our setup.
          # TODO: Test and migrate to v1.0.0+ (uses `bundle exec inferno migrate` instead of rake)
          PINNED_TAG="v0.6.4"
          echo "Inferno version: $PINNED_TAG (pinned)"
          echo "tag=$PINNED_TAG" >> $GITHUB_OUTPUT

      - name: Cache Inferno
        id: inferno-cache
        uses: actions/cache@v5
        with:
          path: |
            inferno
          key: inferno-${{ steps.inferno-version.outputs.tag }}-ruby3.3-v2

      - name: Setup Inferno
        if: steps.inferno-cache.outputs.cache-hit != 'true'
        run: |
          TAG="${{ steps.inferno-version.outputs.tag }}"
          git clone --branch "$TAG" --depth 1 https://github.com/inferno-framework/smart-app-launch-test-kit.git inferno

      # Always run bundle install — the cache only stores the git clone, not installed gems.
      # bundle install is fast (~5s) when Gemfile.lock hasn't changed.
      - name: Install Inferno Gems
        run: |
          cd inferno
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4

      - name: Setup Inferno DB
        run: |
          cd inferno
          export REDIS_URL="redis://localhost:6379"
          bundle exec rake db:migrate || bundle exec rake db:setup || true

      - name: Start Inferno
        run: |
          cd inferno
          # Inferno uses SQLite internally — do NOT set DATABASE_URL
          export REDIS_URL="redis://localhost:6379"
          
          # Disable TLS tests in local CI (no HTTPS) — TLS is validated on deployed environments
          export INFERNO_DISABLE_TLS_TEST=true
          
          # Start Sidekiq worker for background job processing (test runs)
          # Must use -r ./worker.rb to load Inferno's job classes
          bundle exec sidekiq -r ./worker.rb &
          SIDEKIQ_PID=$!
          echo "Started Sidekiq worker (PID: $SIDEKIQ_PID)"
          
          # Give Sidekiq a moment to connect to Redis
          sleep 2
          
          # Start Inferno web server in background
          bundle exec puma -p 4567 &
          PUMA_PID=$!
          echo "Started Puma server (PID: $PUMA_PID)"
          
          # Wait for Inferno to be ready
          echo "Waiting for Inferno..."
          INFERNO_READY=false
          for i in {1..60}; do
            if curl -sf http://localhost:4567 > /dev/null 2>&1; then
              echo "Inferno is ready!"
              INFERNO_READY=true
              break
            fi
            echo "Attempt $i/60..."
            sleep 5
          done
          
          if [ "$INFERNO_READY" = "false" ]; then
            echo "ERROR: Inferno failed to start after 300 seconds"
            echo "Puma logs:"
            jobs -l || true
            exit 1
          fi

      # Register test client in Keycloak (only for local targets - deployed already configured)
      - name: Verify Keycloak Setup
        if: steps.config.outputs.target != 'deployed'
        run: |
          # Get admin token
          TOKEN=$(curl -s -X POST "http://localhost:8080/realms/master/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password" \
            -d "client_id=admin-cli" \
            -d "username=admin" \
            -d "password=admin" | jq -r '.access_token')
          
          echo "Admin token obtained: ${TOKEN:0:20}..."
          
          # Verify realm was imported from realm-export.json
          REALM_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://localhost:8080/admin/realms/proxy-smart" \
            -H "Authorization: Bearer $TOKEN")
          
          if [ "$REALM_CHECK" = "200" ]; then
            echo "✓ proxy-smart realm exists"
          else
            echo "ERROR: proxy-smart realm not found! Check realm-export.json import."
            exit 1
          fi
          
          # Verify inferno-test-client exists (from realm-export.json)
          CLIENT_CHECK=$(curl -s "http://localhost:8080/admin/realms/proxy-smart/clients?clientId=inferno-test-client" \
            -H "Authorization: Bearer $TOKEN" | jq 'length')
          
          if [ "$CLIENT_CHECK" -gt 0 ]; then
            echo "✓ inferno-test-client exists"
          else
            echo "ERROR: inferno-test-client not found! Check realm-export.json"
            exit 1
          fi
          
          # Verify testuser exists (from realm-export.json)
          USER_CHECK=$(curl -s "http://localhost:8080/admin/realms/proxy-smart/users?username=testuser" \
            -H "Authorization: Bearer $TOKEN" | jq 'length')
          
          if [ "$USER_CHECK" -gt 0 ]; then
            echo "✓ testuser exists"
          else
            echo "ERROR: testuser not found! Check realm-export.json"
            exit 1
          fi
          
          # Verify SMART scopes exist
          echo "Checking SMART client scopes..."
          SCOPES=$(curl -s "http://localhost:8080/admin/realms/proxy-smart/client-scopes" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.[].name' | sort)
          echo "Available client scopes:"
          echo "$SCOPES"
          
          # Check for key SMART scopes
          if echo "$SCOPES" | grep -q "launch/patient"; then
            echo "✓ SMART scopes configured"
          else
            echo "WARNING: SMART scopes not found - they should be in realm-export.json"
          fi
          
          # Verify offline_access role exists (from realm-export.json)
          echo ""
          echo "Verifying offline_access role..."
          OFFLINE_ROLE=$(curl -s "http://localhost:8080/admin/realms/proxy-smart/roles/offline_access" \
            -H "Authorization: Bearer $TOKEN")
          OFFLINE_ROLE_ID=$(echo "$OFFLINE_ROLE" | jq -r '.id')
          
          if [ "$OFFLINE_ROLE_ID" != "null" ] && [ -n "$OFFLINE_ROLE_ID" ]; then
            echo "✓ offline_access role exists (ID: $OFFLINE_ROLE_ID)"
          else
            echo "WARNING: offline_access role not found - should be in realm-export.json"
          fi
          
          # Verify testuser has offline_access role
          TESTUSER_ID=$(curl -s "http://localhost:8080/admin/realms/proxy-smart/users?username=testuser" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.[0].id')
          USER_ROLES=$(curl -s "http://localhost:8080/admin/realms/proxy-smart/users/$TESTUSER_ID/role-mappings/realm" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.[].name')
          echo "testuser roles: $USER_ROLES"
          
          if echo "$USER_ROLES" | grep -q "offline_access"; then
            echo "✓ testuser has offline_access role"
          else
            echo "WARNING: testuser missing offline_access role - should be in realm-export.json"
          fi
          
          # Verify doctor user has offline_access role
          DOCTOR_ID=$(curl -s "http://localhost:8080/admin/realms/proxy-smart/users?username=doctor" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.[0].id')
          
          if [ "$DOCTOR_ID" != "null" ] && [ -n "$DOCTOR_ID" ]; then
            DOCTOR_ROLES=$(curl -s "http://localhost:8080/admin/realms/proxy-smart/users/$DOCTOR_ID/role-mappings/realm" \
              -H "Authorization: Bearer $TOKEN" | jq -r '.[].name')
            echo "doctor roles: $DOCTOR_ROLES"
            
            if echo "$DOCTOR_ROLES" | grep -q "offline_access"; then
              echo "✓ doctor has offline_access role"
            else
              echo "WARNING: doctor missing offline_access role - should be in realm-export.json"
            fi
          fi
          
          echo ""
          echo "=== Keycloak setup verified ==="

      # Seed FHIR resources for deployed mode (local mode seeds in earlier step)
      - name: Seed FHIR Test Resources (Deployed)
        if: steps.config.outputs.target == 'deployed'
        continue-on-error: true
        run: |
          BACKEND_URL="${{ steps.config.outputs.backend_url }}"
          KC_URL="${{ steps.config.outputs.kc_url }}"
          KC_REALM="${{ steps.config.outputs.kc_realm }}"
          CLIENT_ID="${{ steps.config.outputs.client_id }}"
          KC_USERNAME="${{ steps.config.outputs.kc_username }}"
          KC_PASSWORD="${{ steps.config.outputs.kc_password }}"
          FHIR_BASE="$BACKEND_URL/proxy-smart-backend/hapi-fhir-server/R4"
          
          echo "Seeding FHIR resources on deployed server..."
          echo "  FHIR Base: $FHIR_BASE"
          
          # Get access token via direct access grant
          TOKEN=$(curl -sf -X POST "$KC_URL/realms/$KC_REALM/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password" \
            -d "client_id=$CLIENT_ID" \
            -d "username=$KC_USERNAME" \
            -d "password=$KC_PASSWORD" \
            -d "scope=openid user/*.*" | jq -r '.access_token')
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "WARNING: Could not obtain token for FHIR resource seeding"
            echo "  Tests requiring fhirUser claim may fail"
            exit 0
          fi
          
          echo "✓ Obtained access token for resource seeding"
          
          # Create Practitioner (matches doctor user's fhirUser claim)
          # Use -s (not -sf) so curl doesn't exit non-zero on HTTP errors, and capture body for diagnostics
          RESP=$(curl -s -w "\n%{http_code}" -X PUT "$FHIR_BASE/Practitioner/example-practitioner" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/fhir+json" \
            -d '{
              "resourceType": "Practitioner",
              "id": "example-practitioner",
              "identifier": [{"system": "http://example.org/practitioners", "value": "doctor"}],
              "active": true,
              "name": [{"family": "Doctor", "given": ["Test"], "prefix": ["Dr."]}],
              "telecom": [{"system": "email", "value": "doctor@example.com"}]
            }')
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          echo "  Practitioner/example-practitioner: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ] 2>/dev/null; then echo "  Error: $BODY"; fi
          
          # Create Patient (for launch/patient scope)
          RESP=$(curl -s -w "\n%{http_code}" -X PUT "$FHIR_BASE/Patient/test-patient" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/fhir+json" \
            -d '{
              "resourceType": "Patient",
              "id": "test-patient",
              "identifier": [{"system": "http://example.org/patients", "value": "12345"}],
              "active": true,
              "name": [{"family": "Test", "given": ["Patient"]}],
              "gender": "unknown",
              "birthDate": "1990-01-01"
            }')
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          echo "  Patient/test-patient: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ] 2>/dev/null; then echo "  Error: $BODY"; fi
          
          echo "✓ FHIR test resources seeded on deployed server"

      # Wake up deployed services right before tests (they may have gone cold during tool setup)
      - name: Warm Up Deployed Services
        if: steps.config.outputs.target == 'deployed'
        run: |
          BACKEND_URL="${{ steps.config.outputs.backend_url }}"
          KC_URL="${{ steps.config.outputs.kc_url }}"
          KC_REALM="${{ steps.config.outputs.kc_realm }}"
          SMART_CONFIG="$BACKEND_URL/proxy-smart-backend/hapi-fhir-server/R4/.well-known/smart-configuration"
          
          echo "Warming up deployed services before test run..."
          
          # Step 1: Wait for backend /health
          echo "Step 1: Waiting for backend /health..."
          for i in $(seq 1 40); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BACKEND_URL/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Backend /health is up (attempt $i)"
              break
            fi
            echo "  Attempt $i/40 — HTTP $HTTP_CODE, waiting 5s..."
            sleep 5
          done
          
          # Step 2: Wait for Keycloak
          echo "Step 2: Waiting for Keycloak..."
          for i in $(seq 1 40); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$KC_URL/realms/$KC_REALM" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Keycloak realm is up (attempt $i)"
              break
            fi
            echo "  Attempt $i/40 — HTTP $HTTP_CODE, waiting 5s..."
            sleep 5
          done
          
          # Step 3: Wait for SMART configuration (the actual endpoint Inferno hits first)
          # This depends on BOTH backend + Keycloak being fully functional
          echo "Step 3: Waiting for SMART configuration endpoint..."
          SMART_READY=false
          for i in $(seq 1 40); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SMART_CONFIG" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ SMART configuration is responding (attempt $i)"
              SMART_READY=true
              break
            fi
            echo "  Attempt $i/40 — HTTP $HTTP_CODE, waiting 5s..."
            sleep 5
          done
          
          if [ "$SMART_READY" = "false" ]; then
            echo "ERROR: SMART configuration endpoint never became healthy"
            echo "  Last HTTP code: $HTTP_CODE"
            echo "  URL: $SMART_CONFIG"
            echo "  The deployed backend may not be functioning correctly"
            exit 1
          fi
          
          echo "✓ All services warmed up and responding"

      # Run Inferno tests via Playwright automation
      - name: Run SMART Compliance Tests
        id: inferno-tests
        run: |
          echo "=== SMART 2.2.0 Compliance Testing with Inferno ==="
          echo ""
          
          # Determine backend URL based on target
          if [ "${{ steps.config.outputs.target }}" = "deployed" ]; then
            BACKEND_BASE="${{ steps.config.outputs.backend_url }}"
            echo "Testing against DEPLOYED backend: $BACKEND_BASE"
          else
            BACKEND_BASE="http://localhost:8445"
            echo "Testing against LOCAL backend: $BACKEND_BASE"
          fi
          
          # Get FHIR server URL from our proxy (dynamic discovery — source of truth)
          echo "### Step 0: Discovering FHIR Servers ###"
          SERVERS=$(curl -sf "$BACKEND_BASE/fhir-servers" 2>&1)
          echo "Available FHIR servers:"
          echo "$SERVERS" | jq '.' 2>/dev/null || echo "$SERVERS"
          
          # Get the first server's endpoints
          SMART_CONFIG_URL=$(echo "$SERVERS" | jq -r '.servers[0].endpoints.smartConfig // empty' 2>/dev/null)
          BASE_FHIR_URL=$(echo "$SERVERS" | jq -r '.servers[0].endpoints.base // empty' 2>/dev/null)
          
          if [ -z "$SMART_CONFIG_URL" ] || [ "$SMART_CONFIG_URL" = "null" ]; then
            echo "::error::No FHIR servers configured - cannot test SMART configuration"
            echo "## SMART Compliance Tests - FAILED" >> $GITHUB_STEP_SUMMARY
            echo "No FHIR servers configured." >> $GITHUB_STEP_SUMMARY
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Override FHIR_SERVER_URL with dynamically discovered URL (handles deployed HTTPS correctly)
          if [ -n "$BASE_FHIR_URL" ] && [ "$BASE_FHIR_URL" != "null" ]; then
            export FHIR_SERVER_URL="$BASE_FHIR_URL"
            echo "Using discovered FHIR URL: $FHIR_SERVER_URL"
          fi
          
          echo "Using SMART config URL: $SMART_CONFIG_URL"
          
          # Step 1: Quick validation of SMART configuration
          echo ""
          echo "### Step 1: Quick SMART Configuration Validation ###"
          SMART_CONFIG=$(curl -sf "$SMART_CONFIG_URL" 2>&1)
          echo "$SMART_CONFIG" | jq '.'
          
          # Check required fields
          AUTH_EP=$(echo "$SMART_CONFIG" | jq -r '.authorization_endpoint // empty')
          TOKEN_EP=$(echo "$SMART_CONFIG" | jq -r '.token_endpoint // empty')
          INTROSPECT_EP=$(echo "$SMART_CONFIG" | jq -r '.introspection_endpoint // empty')
          
          if [ -z "$AUTH_EP" ] || [ -z "$TOKEN_EP" ]; then
            echo "::error::Missing required SMART endpoints"
            echo "## SMART Compliance Tests - FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Missing authorization_endpoint or token_endpoint" >> $GITHUB_STEP_SUMMARY
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=1" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✓ authorization_endpoint: $AUTH_EP"
          echo "✓ token_endpoint: $TOKEN_EP"
          if [ -n "$INTROSPECT_EP" ]; then
            echo "✓ introspection_endpoint: $INTROSPECT_EP"
          fi
          
          # Step 2: Run Inferno tests with Playwright OAuth automation
          echo ""
          echo "### Step 2: Running Inferno SMART STU2.2 Tests ###"
          echo ""
          echo "Test Groups:"
          echo "  1. Standalone Launch (Discovery + OAuth + OpenID Connect + Token Refresh)"
          echo "  2. Token Introspection (uses tokens from Standalone Launch)"
          echo "  3. Backend Services (client_credentials + asymmetric JWT)"
          echo "  4. EHR Launch (EHR-initiated launch with patient context)"
          echo ""
          
          # Copy the script to the Playwright directory and run it from there
          cp .github/scripts/inferno-oauth-automation.js /tmp/playwright-setup/
          cd /tmp/playwright-setup
          node inferno-oauth-automation.js 2>&1 | tee $GITHUB_WORKSPACE/inferno-output.log
          INFERNO_EXIT_CODE=${PIPESTATUS[0]}
          cd $GITHUB_WORKSPACE
          
          # Parse results from the log
          if grep -q "PASS:" inferno-output.log; then
            PASSED=$(grep -c "✓ PASS:" inferno-output.log || true)
            FAILED=$(grep -c "✗ FAIL:" inferno-output.log || true)
          else
            PASSED=0
            FAILED=0
          fi
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          
          # Write summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## SMART 2.2.0 Compliance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$INFERNO_EXIT_CODE" -eq 0 ]; then
            echo "**Status: ✓ PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status: ✗ FAILED (exit code: $INFERNO_EXIT_CODE)**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
          echo "- Test Stage: ${{ env.TEST_STAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Groups Tested" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Standalone Launch (Discovery + OAuth + OIDC + Token Refresh)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Token Introspection" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Backend Services (client_credentials + asymmetric JWT)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ EHR Launch (EHR-initiated launch with patient context)" >> $GITHUB_STEP_SUMMARY
          
          # Include FHIR server info
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### FHIR Server Configuration" >> $GITHUB_STEP_SUMMARY
          FHIR_VERSION=$(echo "$SMART_CONFIG" | jq -r '.fhirVersion // "R4"')
          echo "- FHIR Version: $FHIR_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- FHIR URL: $FHIR_SERVER_URL" >> $GITHUB_STEP_SUMMARY
          echo "- Authorization Endpoint: $AUTH_EP" >> $GITHUB_STEP_SUMMARY
          echo "- Token Endpoint: $TOKEN_EP" >> $GITHUB_STEP_SUMMARY
          
          # Set outputs
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          
          exit $INFERNO_EXIT_CODE
        env:
          INFERNO_URL: ${{ steps.config.outputs.inferno_url }}
          FHIR_SERVER_URL: ${{ steps.config.outputs.target == 'deployed' && format('{0}/proxy-smart-backend/hapi-fhir-server/R4', steps.config.outputs.backend_url) || format('http://localhost:{0}/proxy-smart-backend/hapi-fhir-server/R4', steps.config.outputs.backend_port) }}
          TEST_SUITE: ${{ steps.config.outputs.test_suite }}
          TEST_STAGE: ${{ env.TEST_STAGE }}
          CLIENT_ID: ${{ steps.config.outputs.client_id }}
          KC_USERNAME: ${{ steps.config.outputs.kc_username }}
          KC_PASSWORD: ${{ steps.config.outputs.kc_password }}

      # Dump backend + keycloak logs for debugging auth failures
      - name: Dump Service Logs
        if: always()
        run: |
          echo "=== Backend Auth Logs (last 200 lines, filtered) ==="
          if [ "${{ steps.config.outputs.target }}" = "deployed" ]; then
            # For deployed targets, fetch logs via SSH if available, otherwise skip
            echo "(Deployed mode — container logs not available from CI runner.)"
            echo "Check VPS logs: docker logs proxy-smart-backend-beta --tail 200 2>&1 | grep -iE 'token|auth|error|warn'"
          else
            # Local CI: dump from Docker containers
            echo "--- Backend logs (auth-related) ---"
            docker logs backend 2>&1 | grep -iE 'token endpoint|keycloak token|forwarding to keycloak|error response|warn|400|401|422|500' | tail -100 || echo "(no backend container)"
            echo ""
            echo "--- Backend logs (last 50 lines) ---"
            docker logs backend 2>&1 | tail -50 || echo "(no backend container)"
            echo ""
            echo "--- Keycloak logs (auth-related, last 50 lines) ---"
            docker logs keycloak 2>&1 | grep -iE 'token|grant|client|error|warn' | tail -50 || echo "(no keycloak container)"
          fi

      # Save test results
      - name: Save Test Results
        if: always()
        run: |
          set +e  # Don't fail on individual commands — this is best-effort artifact collection
          mkdir -p test-results
          
          # Use deployed URL when available, otherwise localhost
          BASE_URL="${DEPLOYED_BACKEND_URL:-http://localhost:8445}"
          
          # Discover servers and get SMART config URL
          SERVERS=$(curl -sf "$BASE_URL/fhir-servers" 2>&1) || SERVERS='{"error":"backend unreachable"}'
          SMART_CONFIG_URL=$(echo "$SERVERS" | jq -r '.servers[0].endpoints.smartConfig // empty' 2>/dev/null)
          METADATA_URL=$(echo "$SERVERS" | jq -r '.servers[0].endpoints.metadata // empty' 2>/dev/null)
          
          # Save server discovery info
          echo "$SERVERS" > test-results/fhir-servers.json
          
          # Save SMART configuration if URL available
          if [ -n "$SMART_CONFIG_URL" ] && [ "$SMART_CONFIG_URL" != "null" ]; then
            curl -sf "$SMART_CONFIG_URL" > test-results/smart-configuration.json 2>/dev/null || echo "{}" > test-results/smart-configuration.json
          else
            echo "{\"note\": \"No FHIR servers configured\"}" > test-results/smart-configuration.json
          fi
          
          # Save FHIR metadata if URL available
          if [ -n "$METADATA_URL" ] && [ "$METADATA_URL" != "null" ]; then
            curl -sf "$METADATA_URL" > test-results/fhir-metadata.json 2>/dev/null || echo "{}" > test-results/fhir-metadata.json
          else
            echo "{\"note\": \"No FHIR servers configured\"}" > test-results/fhir-metadata.json
          fi
          
          # Save Inferno test output
          cp inferno-output.log test-results/inferno-output.log 2>/dev/null || true
          
          # Save Playwright screenshots if any
          cp oauth-error.png test-results/oauth-error.png 2>/dev/null || true
          
          # Also save service logs (only exists for local targets)
          docker logs keycloak > test-results/keycloak.log 2>&1 || true

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: inferno-test-results-${{ env.TEST_STAGE }}
          path: test-results/
          retention-days: 30

      # Commit test report to repository
      - name: Commit Test Report
        if: always()
        run: |
          # Create report directory
          REPORT_DIR="testing/${TEST_STAGE}/report"
          mkdir -p "$REPORT_DIR"
          
          # Copy test results to report directory
          cp -r test-results/* "$REPORT_DIR/" 2>/dev/null || true
          
          # Create summary report
          cat > "$REPORT_DIR/summary.json" << EOF
          {
            "test_suite": "${TEST_SUITE}",
            "test_stage": "${TEST_STAGE}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "passed": ${{ steps.inferno-tests.outputs.passed || 0 }},
            "failed": ${{ steps.inferno-tests.outputs.failed || 0 }},
            "status": "${{ steps.inferno-tests.outcome || 'unknown' }}"
          }
          EOF
          
          # Configure git
          git config user.name "proxy-smart-releaser[bot]"
          git config user.email "proxy-smart-releaser[bot]@users.noreply.github.com"
          
          # Ensure we use the app token for push (survives branch switches)
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          
          # Save report files before branch switch
          cp -r "$REPORT_DIR" /tmp/report-backup
          
          # Clean up report files before switching branches (they're backed up in /tmp)
          rm -rf "$REPORT_DIR"
          
          # Discard generated lockfile changes and stash any other modifications before switching branches
          git checkout -- bun.lock 2>/dev/null || true
          git stash --include-untracked 2>/dev/null || true
          
          # Checkout develop branch and pull latest (to avoid race conditions with version updates)
          git fetch origin develop
          git checkout develop
          git pull origin develop --rebase || true
          git stash pop 2>/dev/null || true
          
          # Restore and add report directory after branch switch
          mkdir -p "$REPORT_DIR"
          cp -r /tmp/report-backup/* "$REPORT_DIR/"
          git add "$REPORT_DIR"
          git diff --staged --quiet || git commit -m "chore(testing): update ${TEST_STAGE} SMART compliance report [skip ci]
          
          Test Suite: ${TEST_SUITE}
          Passed: ${{ steps.inferno-tests.outputs.passed || 0 }}
          Failed: ${{ steps.inferno-tests.outputs.failed || 0 }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Push changes to develop with retry on conflict
          for i in 1 2 3; do
            if git push origin develop; then
              echo "✓ Report pushed successfully"
              break
            else
              echo "Push failed, retrying after pull..."
              git stash
              git pull origin develop --rebase || git rebase --abort
              git stash pop || true
              git add "$REPORT_DIR"
              git diff --staged --quiet || git commit -m "chore(testing): update ${TEST_STAGE} SMART compliance report [skip ci]"
            fi
          done
        env:
          TEST_STAGE: ${{ env.TEST_STAGE }}
          TEST_SUITE: ${{ env.TEST_SUITE }}
          APP_TOKEN: ${{ steps.app-token.outputs.token || github.token }}

      # Auto-create issue and assign Copilot Cloud Agent on failure
      - name: Copilot Self-Heal (Create Issue)
        if: false # disabled — failure() && steps.inferno-tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          echo "🤖 Creating self-heal issue for Copilot Cloud Agent..."

          # Extract failure analysis from inferno output (last 200 lines covers the analysis)
          FAILURE_LOG=""
          if [ -f "$GITHUB_WORKSPACE/inferno-output.log" ]; then
            FAILURE_LOG=$(tail -200 "$GITHUB_WORKSPACE/inferno-output.log")
          fi

          PASSED=${{ steps.inferno-tests.outputs.passed || 0 }}
          FAILED=${{ steps.inferno-tests.outputs.failed || 0 }}

          # Check if a self-heal issue already exists for this branch
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "copilot-self-heal,inferno" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING with latest failure..."
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "## Updated Failure (Run #${{ github.run_number }})

          **Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`${{ github.sha }}\`
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Results:** $PASSED passed, $FAILED failed

          <details><summary>Failure Analysis</summary>

          \`\`\`
          ${FAILURE_LOG}
          \`\`\`
          </details>"
            echo "✓ Updated issue #$EXISTING"
          else
            echo "Creating new self-heal issue..."

            # Ensure labels exist
            gh label create "copilot-self-heal" --description "Auto-created for Copilot Cloud Agent" --color "7057ff" --repo "${{ github.repository }}" 2>/dev/null || true
            gh label create "inferno" --description "SMART Inferno compliance tests" --color "d73a4a" --repo "${{ github.repository }}" 2>/dev/null || true

            ISSUE_URL=$(gh issue create \
              --repo "${{ github.repository }}" \
              --title "🤖 Fix Inferno SMART compliance test failures (${{ github.ref_name }})" \
              --label "copilot-self-heal,inferno" \
              --assignee "copilot" \
              --body "## Inferno SMART STU2.2 Compliance Test Failure

          **Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`${{ github.sha }}\`
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Results:** $PASSED passed, $FAILED failed

          ### Failure Analysis

          \`\`\`
          ${FAILURE_LOG}
          \`\`\`

          ### Instructions

          1. Read \`.github/copilot-instructions.md\` for architecture context and common failure patterns.
          2. Diagnose the root cause by matching error signatures to the failure patterns table.
          3. Fix the relevant config files (see Key Files table in instructions).
          4. Ensure config consistency rules are satisfied across all affected files.
          5. Create a PR targeting \`develop\` with the fix.")

            echo "✓ Created issue: $ISSUE_URL"
          fi

      # Cleanup
      - name: Cleanup
        if: always()
        run: |
          docker stop keycloak || true
          docker rm keycloak || true
          pkill -f "bun run start" || true
          pkill -f puma || true
