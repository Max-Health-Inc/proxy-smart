name: Release Orchestrator

on:
  workflow_call:
    inputs:
      release_type:
        description: "Type of release (alpha, beta, RELEASE)"
        required: true
        type: string
      source_branch:
        description: "Source branch for the release"
        required: true
        type: string
      target_branch:
        description: "Target branch to push changes to"
        required: true
        type: string
      should_bump_version:
        description: "Whether to bump the version number"
        required: false
        type: boolean
        default: false
      is_prerelease:
        description: "Whether this is a prerelease"
        required: false
        type: boolean
        default: false
    
    outputs:
      version:
        description: "The version that was released"
        value: ${{ jobs.version.outputs.new_version }}
      changelog:
        description: "The generated changelog"
        value: ${{ jobs.changelog.outputs.changelog }}
      release_url:
        description: "The URL of the created release"
        value: ${{ jobs.release.outputs.release_url }}

    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      DISCORD_WEBHOOK_URL:
        required: false
      VPS_SSH_KEY:
        required: false
      VPS_HOST:
        required: false
      VPS_USER:
        required: false

jobs:
  # Manage version
  version:
    name: Version Management
    uses: ./.github/workflows/version-operations.yml
    with:
      operation: 'update'
      release_type: ${{ inputs.release_type }}
      should_bump_version: ${{ inputs.should_bump_version }}
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  # Extract changelog from CHANGELOG.md
  changelog:
    name: Extract Changelog
    needs: [version]
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.extract.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for version
        id: extract
        run: |
          python3 << 'PYEOF'
          import json, re, sys

          with open('package.json', encoding='utf-8') as f:
              version = json.load(f).get('version', 'unknown')

          version_base = version.split('+')[0]

          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
          except FileNotFoundError:
              print(f"⚠️  CHANGELOG.md not found, using default", file=sys.stderr)
              with open('changelog.txt', 'w') as f:
                  f.write(f"Release {version_base}")
              sys.exit(0)

          pattern = rf'## \[{re.escape(version_base)}[^\]]*\][^\n]*\n(.*?)(?=\n## \[|$)'
          match = re.search(pattern, content, re.DOTALL)

          if match:
              notes = match.group(1).strip()
              print(f"✅ Extracted changelog for {version_base}", file=sys.stderr)
          else:
              notes = f"Release {version_base}"
              print(f"⚠️  No changelog section for {version_base}, using default", file=sys.stderr)

          with open('changelog.txt', 'w', encoding='utf-8') as f:
              f.write(notes)
          PYEOF

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # Build and test
  build:
    name: Build and Test
    needs: [version]
    uses: ./.github/workflows/build-and-test.yml
    with:
      run_tests: true
      fail_on_test_failure: true

  # Create GitHub release
  release:
    name: Create GitHub Release
    needs: [version, changelog, build]
    uses: ./.github/workflows/create-release.yml
    with:
      release_type: ${{ inputs.release_type }}
      version: ${{ needs.version.outputs.new_version }}
      changelog: ${{ needs.changelog.outputs.changelog }}
      source_branch: ${{ inputs.source_branch }}
      is_prerelease: ${{ inputs.is_prerelease }}
      build_number: ${{ needs.version.outputs.build_number }}
      short_sha: ${{ needs.version.outputs.short_sha }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  # Discord notification on success
  notify-success:
    name: Discord Success Notification
    needs: [version, changelog, release]
    if: ${{ success() }}
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord success notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notification-type: 'release'
          title: '🚀 New Release: v${{ needs.version.outputs.new_version }}'
          description: 'A new ${{ inputs.release_type }} release has been successfully published!'
          version: ${{ needs.version.outputs.new_version }}
          release-type: ${{ inputs.release_type }}
          changelog: ${{ needs.changelog.outputs.changelog }}
          repository: ${{ github.repository }}
          commit-sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          release-url: ${{ needs.release.outputs.release_url }}

  # Discord notification on failure
  notify-failure:
    name: Discord Failure Notification
    needs: [version, changelog, build, release]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord failure notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notification-type: 'error'
          title: "❌ Release Failed: v${{ needs.version.outputs.new_version || 'Unknown' }}"
          description: 'The ${{ inputs.release_type }} release process has failed. Please check the workflow logs.'
          version: ${{ needs.version.outputs.new_version || 'Unknown' }}
          release-type: ${{ inputs.release_type }}
          repository: ${{ github.repository }}
          commit-sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          color: 'FF0000'
