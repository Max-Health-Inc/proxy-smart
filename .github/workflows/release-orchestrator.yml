name: Release Orchestrator

on:
  workflow_call:
    inputs:
      release_type:
        description: "Type of release (alpha, beta, RELEASE)"
        required: true
        type: string
      source_branch:
        description: "Source branch for the release"
        required: true
        type: string
      target_branch:
        description: "Target branch to push changes to"
        required: true
        type: string
      should_bump_version:
        description: "Whether to bump the version number"
        required: false
        type: boolean
        default: false
      is_prerelease:
        description: "Whether this is a prerelease"
        required: false
        type: boolean
        default: false
    
    outputs:
      version:
        description: "The version that was released"
        value: ${{ jobs.version.outputs.new_version }}
      changelog:
        description: "The generated changelog"
        value: ${{ jobs.changelog.outputs.changelog }}
      release_url:
        description: "The URL of the created release"
        value: ${{ jobs.release.outputs.release_url }}

    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      OPENAI_API_KEY:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false
      VPS_SSH_KEY:
        required: false
      VPS_HOST:
        required: false
      VPS_USER:
        required: false

jobs:
  # Manage version
  version:
    name: Version Management
    uses: ./.github/workflows/version-operations.yml
    with:
      operation: 'update'
      release_type: ${{ inputs.release_type }}
      should_bump_version: ${{ inputs.should_bump_version }}
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  # Generate or extract changelog
  changelog:
    name: Generate Changelog
    needs: [version]
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.final.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Try to extract from CHANGELOG.md
        id: extract
        run: |
          python3 << 'PYEOF'
          import json, re, sys

          with open('package.json', encoding='utf-8') as f:
              version = json.load(f).get('version', 'unknown')

          # Strip build metadata (+...) and prerelease suffix (-alpha.xxx, -beta.xxx, -RELEASE.xxx)
          # to get the base semver, e.g. "0.0.3-RELEASE.202604101219.41a64d4f" -> "0.0.3"
          semver_base = re.sub(r'[-+].*$', '', version)

          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
          except FileNotFoundError:
              print("found=false", file=sys.stderr)
              sys.exit(0)

          # First try exact match (for alpha/beta where version_base exists in CHANGELOG)
          version_no_build = version.split('+')[0]
          exact_pattern = rf'## \[{re.escape(version_no_build)}[^\]]*\][^\n]*\n(.*?)(?=\n## \[|$)'
          exact_match = re.search(exact_pattern, content, re.DOTALL)

          if exact_match and exact_match.group(1).strip():
              notes = exact_match.group(1).strip()
              with open('changelog.txt', 'w', encoding='utf-8') as f:
                  f.write(notes)
              print(f"✅ Extracted changelog for {version_no_build}", file=sys.stderr)
          else:
              # For production releases: collect ALL sections matching the base semver
              # e.g. "0.0.3" matches "0.0.3-alpha.xxx", "0.0.3-beta.xxx", "0.0.3"
              all_pattern = rf'## \[{re.escape(semver_base)}[^\]]*\][^\n]*\n(.*?)(?=\n## \[|$)'
              matches = re.findall(all_pattern, content, re.DOTALL)

              if matches:
                  # Collect unique non-empty lines from all matching sections, preserving order
                  seen = set()
                  lines = []
                  for body in matches:
                      for line in body.strip().splitlines():
                          stripped = line.strip()
                          # Skip empty lines, "Full Changelog" links, and "None" entries
                          if not stripped:
                              continue
                          if stripped.startswith('**Full Changelog**'):
                              continue
                          if stripped == '- None':
                              continue
                          if stripped not in seen:
                              seen.add(stripped)
                              lines.append(line)

                  if lines:
                      notes = '\n'.join(lines)
                      with open('changelog.txt', 'w', encoding='utf-8') as f:
                          f.write(notes)
                      print(f"✅ Aggregated changelog from {len(matches)} section(s) for {semver_base}", file=sys.stderr)
                  else:
                      print(f"⚠️  Changelog sections found for {semver_base} but all empty", file=sys.stderr)
              else:
                  print(f"⚠️  No changelog section for {version_no_build} or {semver_base}", file=sys.stderr)
          PYEOF

          if [ -s changelog.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        if: steps.extract.outputs.found != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        if: steps.extract.outputs.found != 'true'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.extract.outputs.found != 'true'
        run: uv pip install --system openai

      - name: Generate changelog from commits
        if: steps.extract.outputs.found != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ inputs.source_branch }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          # For production releases, find the last RELEASE tag to get a meaningful commit range.
          # For alpha/beta, use the most recent tag of any kind.
          if [ "$RELEASE_TYPE" = "RELEASE" ] || [ "$RELEASE_TYPE" = "production" ]; then
            LAST_TAG=$(git tag -l 'v*-RELEASE*' --sort=-v:refname | head -1)
            if [ -z "$LAST_TAG" ]; then
              LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
            fi
          else
            LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          fi

          if [ -z "$LAST_TAG" ]; then
            FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
            LAST_TAG="$FIRST_COMMIT"
          fi

          echo "📊 Collecting commits from $LAST_TAG to HEAD"
          git log $LAST_TAG..HEAD --pretty=format:"[%h] %an: %s" --no-merges > commit_messages.txt

          COMMIT_COUNT=$(wc -l < commit_messages.txt)
          echo "✅ Found $COMMIT_COUNT commits since $LAST_TAG"

          # Try AI generation
          if [ -n "$OPENAI_API_KEY" ]; then
            python scripts/workflows/generate_changelog_ai.py && true
          fi

          # Fallback to manual categorization
          if [ ! -s changelog_entry.txt ]; then
            echo "📝 Falling back to manual categorization"
            python3 scripts/workflows/categorize_commits.py
          fi

          # Copy result
          if [ -s changelog_entry.txt ]; then
            cp changelog_entry.txt changelog.txt
          else
            echo "- Release ${{ inputs.release_type }}" > changelog.txt
          fi

      - name: Output changelog
        id: final
        run: |
          DELIMITER="CHANGELOG_$(openssl rand -hex 8)"
          echo "changelog<<${DELIMITER}" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

  # Build and test
  build:
    name: Build and Test
    needs: [version]
    uses: ./.github/workflows/build-and-test.yml
    with:
      run_tests: true
      fail_on_test_failure: true
    secrets: inherit

  # Create GitHub release
  release:
    name: Create GitHub Release
    needs: [version, changelog, build]
    uses: ./.github/workflows/create-release.yml
    with:
      release_type: ${{ inputs.release_type }}
      version: ${{ needs.version.outputs.new_version }}
      changelog: ${{ needs.changelog.outputs.changelog }}
      source_branch: ${{ inputs.source_branch }}
      is_prerelease: ${{ inputs.is_prerelease }}
      build_number: ${{ needs.version.outputs.build_number }}
      short_sha: ${{ needs.version.outputs.short_sha }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  # Discord notification on success
  notify-success:
    name: Discord Success Notification
    needs: [version, changelog, release]
    if: ${{ success() }}
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord success notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notification-type: 'release'
          title: '🚀 New Release: v${{ needs.version.outputs.new_version }}'
          description: 'A new ${{ inputs.release_type }} release has been successfully published!'
          version: ${{ needs.version.outputs.new_version }}
          release-type: ${{ inputs.release_type }}
          changelog: ${{ needs.changelog.outputs.changelog }}
          repository: ${{ github.repository }}
          commit-sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          release-url: ${{ needs.release.outputs.release_url }}

  # Discord notification on failure
  notify-failure:
    name: Discord Failure Notification
    needs: [version, changelog, build, release]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord failure notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notification-type: 'error'
          title: "❌ Release Failed: v${{ needs.version.outputs.new_version || 'Unknown' }}"
          description: 'The ${{ inputs.release_type }} release process has failed. Please check the workflow logs.'
          version: ${{ needs.version.outputs.new_version || 'Unknown' }}
          release-type: ${{ inputs.release_type }}
          repository: ${{ github.repository }}
          commit-sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          color: 'FF0000'
