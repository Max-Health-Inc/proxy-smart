name: 'Setup Node.js with AI Dependencies'
description: 'Delegates to org-wide composite action in Max-Health-Inc/.github'

inputs:
  node-version:
    description: 'Node.js version to setup'
    required: false
    default: '22'
  bun-version:
    description: 'Bun version to install'
    required: false
    default: 'latest'
  fetch-depth:
    description: 'Checkout fetch depth'
    required: false
    default: '0'
  checkout:
    description: 'Whether to checkout code'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - uses: Max-Health-Inc/.github/.github/actions/setup-node-ai@main
      with:
        node-version: ${{ inputs.node-version }}
        bun-version: ${{ inputs.bun-version }}
        fetch-depth: ${{ inputs.fetch-depth }}
        checkout: ${{ inputs.checkout }}
