name: 'Discord Release Notification'
description: 'Send rich Discord webhook notifications for releases and deployments'

inputs:
  webhook-url:
    description: 'Discord webhook URL'
    required: true
  notification-type:
    description: 'Type of notification (release, deployment, error, success)'
    required: true
  title:
    description: 'Notification title'
    required: true
  description:
    description: 'Notification description'
    required: false
    default: ''
  version:
    description: 'Release version'
    required: false
    default: ''
  release-type:
    description: 'Release type (alpha, beta, production)'
    required: false
    default: ''
  changelog:
    description: 'Release changelog'
    required: false
    default: ''
  repository:
    description: 'Repository name'
    required: false
    default: ${{ github.repository }}
  commit-sha:
    description: 'Commit SHA'
    required: false
    default: ${{ github.sha }}
  actor:
    description: 'GitHub actor'
    required: false
    default: ${{ github.actor }}
  workflow-url:
    description: 'Workflow run URL'
    required: false
    default: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  color:
    description: 'Embed color (hex without #)'
    required: false
    default: ''
  deployment-stage:
    description: 'Deployment stage (alpha, beta, production)'
    required: false
    default: ''
  deployment-target:
    description: 'Deployment target (local, northflank, vps)'
    required: false
    default: ''
  fhir-server-url:
    description: 'FHIR server URL'
    required: false
    default: ''
  keycloak-url:
    description: 'Keycloak URL'
    required: false
    default: ''
  release-url:
    description: 'GitHub release URL'
    required: false
    default: ''
  app-url:
    description: 'Main application URL'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Determine notification color
      id: color
      shell: bash
      run: |
        COLOR="${{ inputs.color }}"
        
        # Default colors based on notification type and release type
        if [ -z "$COLOR" ]; then
          case "${{ inputs.notification-type }}" in
            "release")
              case "${{ inputs.release-type }}" in
                "alpha") COLOR="FFA500" ;;      # Orange
                "beta") COLOR="0099FF" ;;       # Blue  
                "production") COLOR="00FF00" ;; # Green
                *) COLOR="7289DA" ;;            # Discord Blurple
              esac
              ;;
            "deployment") COLOR="00D4AA" ;;     # Teal
            "testing") COLOR="9932CC" ;;        # Purple
            "error") COLOR="FF0000" ;;          # Red
            "success") COLOR="00FF00" ;;        # Green
            *) COLOR="7289DA" ;;                # Discord Blurple
          esac
        fi
        
        echo "color=$COLOR" >> $GITHUB_OUTPUT

    - name: Prepare changelog for Discord
      id: changelog
      shell: bash
      run: |
        # For safety, we'll either skip the changelog or use a simple placeholder
        # The full changelog is available in the GitHub release
        if [ -n "${{ inputs.changelog }}" ]; then
          echo "formatted_changelog=📋 Changelog available in the GitHub release" >> $GITHUB_OUTPUT
        else
          echo "formatted_changelog=" >> $GITHUB_OUTPUT
        fi

    - name: Send Discord notification
      shell: bash
      run: |
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
        COLOR_DEC=$((0x${{ steps.color.outputs.color }}))
        
        # Build fields array using jq for safe JSON construction
        FIELDS_JSON="[]"
        
        add_field() {
          local name="$1" value="$2" inline="${3:-true}"
          FIELDS_JSON=$(echo "$FIELDS_JSON" | jq --arg n "$name" --arg v "$value" --argjson i "$inline" '. + [{"name": $n, "value": $v, "inline": $i}]')
        }
        
        [ -n "${{ inputs.version }}" ] && add_field "Version" "${{ inputs.version }}"
        [ -n "${{ inputs.release-type }}" ] && add_field "Type" "${{ inputs.release-type }}"
        [ -n "${{ inputs.deployment-stage }}" ] && add_field "Stage" "${{ inputs.deployment-stage }}"
        [ -n "${{ inputs.deployment-target }}" ] && add_field "Target" "${{ inputs.deployment-target }}"
        [ -n "${{ inputs.actor }}" ] && add_field "Triggered by" "${{ inputs.actor }}"
        
        SHORT_SHA=$(echo "${{ inputs.commit-sha }}" | cut -c1-8)
        add_field "Commit" "[$SHORT_SHA](https://github.com/${{ inputs.repository }}/commit/${{ inputs.commit-sha }})"
        
        [ -n "${{ inputs.fhir-server-url }}" ] && add_field "FHIR Server" "[Link](${{ inputs.fhir-server-url }})"
        [ -n "${{ inputs.keycloak-url }}" ] && add_field "Keycloak" "[Link](${{ inputs.keycloak-url }})"
        [ -n "${{ inputs.app-url }}" ] && add_field "Proxy Smart" "[Link](${{ inputs.app-url }})"
        [ -n "${{ inputs.workflow-url }}" ] && add_field "Workflow" "[Actions](${{ inputs.workflow-url }})"
        [ -n "${{ inputs.release-url }}" ] && add_field "Release" "[GitHub](${{ inputs.release-url }})"
        [ -n "${{ steps.changelog.outputs.formatted_changelog }}" ] && add_field "Changelog" "${{ steps.changelog.outputs.formatted_changelog }}" false
        
        # Build payload with jq for proper JSON escaping
        PAYLOAD=$(jq -n \
          --arg title "${{ inputs.title }}" \
          --arg desc "${{ inputs.description }}" \
          --argjson color "$COLOR_DEC" \
          --arg ts "$TIMESTAMP" \
          --argjson fields "$FIELDS_JSON" \
          --arg repo "${{ inputs.repository }}" \
          '{
            "embeds": [{
              "title": $title,
              "description": $desc,
              "color": $color,
              "timestamp": $ts,
              "fields": $fields,
              "footer": {
                "text": $repo,
                "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
              }
            }]
          }')
        
        # Send the webhook
        HTTP_CODE=$(curl -s -o /tmp/discord-response.txt -w "%{http_code}" \
             -H "Content-Type: application/json" \
             -d "$PAYLOAD" \
             "${{ inputs.webhook-url }}")
        
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
          echo "Discord notification sent successfully (HTTP $HTTP_CODE)"
        else
          echo "WARNING: Discord notification returned HTTP $HTTP_CODE"
          cat /tmp/discord-response.txt 2>/dev/null || true
          # Don't fail the workflow for Discord notification issues
          exit 0
        fi

    - name: Log notification details
      shell: bash
      run: |
        echo "Discord notification sent:"
        echo "  Type: ${{ inputs.notification-type }}"
        echo "  Title: ${{ inputs.title }}"
        echo "  Color: #${{ steps.color.outputs.color }}"
        echo "  Repository: ${{ inputs.repository }}"
        if [ -n "${{ inputs.version }}" ]; then
          echo "  Version: ${{ inputs.version }}"
        fi
        if [ -n "${{ inputs.release-type }}" ]; then
          echo "  Release Type: ${{ inputs.release-type }}"
        fi
