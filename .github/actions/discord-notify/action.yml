name: 'Discord Release Notification'
description: 'Send rich Discord webhook notifications for releases and deployments'

inputs:
  webhook-url:
    description: 'Discord webhook URL'
    required: true
  notification-type:
    description: 'Type of notification (release, deployment, error, success)'
    required: true
  title:
    description: 'Notification title'
    required: true
  description:
    description: 'Notification description'
    required: false
    default: ''
  version:
    description: 'Release version'
    required: false
    default: ''
  release-type:
    description: 'Release type (alpha, beta, production)'
    required: false
    default: ''
  changelog:
    description: 'Release changelog'
    required: false
    default: ''
  repository:
    description: 'Repository name'
    required: false
    default: ${{ github.repository }}
  commit-sha:
    description: 'Commit SHA'
    required: false
    default: ${{ github.sha }}
  actor:
    description: 'GitHub actor'
    required: false
    default: ${{ github.actor }}
  workflow-url:
    description: 'Workflow run URL'
    required: false
    default: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  color:
    description: 'Embed color (hex without #)'
    required: false
    default: ''
  deployment-stage:
    description: 'Deployment stage (alpha, beta, production)'
    required: false
    default: ''
  deployment-target:
    description: 'Deployment target (local, vps)'
    required: false
    default: ''
  fhir-server-url:
    description: 'FHIR server URL'
    required: false
    default: ''
  keycloak-url:
    description: 'Keycloak URL'
    required: false
    default: ''
  release-url:
    description: 'GitHub release URL'
    required: false
    default: ''
  app-url:
    description: 'Main application URL'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Determine notification color
      id: color
      shell: bash
      env:
        INPUT_COLOR: ${{ inputs.color }}
        INPUT_NOTIFICATION_TYPE: ${{ inputs.notification-type }}
        INPUT_RELEASE_TYPE: ${{ inputs.release-type }}
      run: |
        COLOR="$INPUT_COLOR"
        
        # Default colors based on notification type and release type
        if [ -z "$COLOR" ]; then
          case "$INPUT_NOTIFICATION_TYPE" in
            "release")
              case "$INPUT_RELEASE_TYPE" in
                "alpha") COLOR="FFA500" ;;      # Orange
                "beta") COLOR="0099FF" ;;       # Blue  
                "production") COLOR="00FF00" ;; # Green
                *) COLOR="7289DA" ;;            # Discord Blurple
              esac
              ;;
            "deployment") COLOR="00D4AA" ;;     # Teal
            "testing") COLOR="9932CC" ;;        # Purple
            "error") COLOR="FF0000" ;;          # Red
            "success") COLOR="00FF00" ;;        # Green
            *) COLOR="7289DA" ;;                # Discord Blurple
          esac
        fi
        
        echo "color=$COLOR" >> $GITHUB_OUTPUT

    - name: Prepare changelog for Discord
      id: changelog
      shell: bash
      env:
        INPUT_CHANGELOG: ${{ inputs.changelog }}
      run: |
        # For safety, we'll either skip the changelog or use a simple placeholder
        # The full changelog is available in the GitHub release
        if [ -n "$INPUT_CHANGELOG" ]; then
          echo "formatted_changelog=📋 Changelog available in the GitHub release" >> $GITHUB_OUTPUT
        else
          echo "formatted_changelog=" >> $GITHUB_OUTPUT
        fi

    - name: Send Discord notification
      shell: bash
      env:
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_DESCRIPTION: ${{ inputs.description }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_RELEASE_TYPE: ${{ inputs.release-type }}
        INPUT_DEPLOYMENT_STAGE: ${{ inputs.deployment-stage }}
        INPUT_DEPLOYMENT_TARGET: ${{ inputs.deployment-target }}
        INPUT_ACTOR: ${{ inputs.actor }}
        INPUT_COMMIT_SHA: ${{ inputs.commit-sha }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_FHIR_SERVER_URL: ${{ inputs.fhir-server-url }}
        INPUT_KEYCLOAK_URL: ${{ inputs.keycloak-url }}
        INPUT_APP_URL: ${{ inputs.app-url }}
        INPUT_WORKFLOW_URL: ${{ inputs.workflow-url }}
        INPUT_RELEASE_URL: ${{ inputs.release-url }}
        INPUT_WEBHOOK_URL: ${{ inputs.webhook-url }}
        EMBED_COLOR: ${{ steps.color.outputs.color }}
        FORMATTED_CHANGELOG: ${{ steps.changelog.outputs.formatted_changelog }}
      run: |
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
        COLOR_DEC=$((0x${EMBED_COLOR}))
        
        # Build fields array using jq for safe JSON construction
        FIELDS_JSON="[]"
        
        add_field() {
          local name="$1" value="$2" inline="${3:-true}"
          FIELDS_JSON=$(echo "$FIELDS_JSON" | jq --arg n "$name" --arg v "$value" --argjson i "$inline" '. + [{"name": $n, "value": $v, "inline": $i}]')
        }
        
        [ -n "$INPUT_VERSION" ] && add_field "Version" "$INPUT_VERSION"
        [ -n "$INPUT_RELEASE_TYPE" ] && add_field "Type" "$INPUT_RELEASE_TYPE"
        [ -n "$INPUT_DEPLOYMENT_STAGE" ] && add_field "Stage" "$INPUT_DEPLOYMENT_STAGE"
        [ -n "$INPUT_DEPLOYMENT_TARGET" ] && add_field "Target" "$INPUT_DEPLOYMENT_TARGET"
        [ -n "$INPUT_ACTOR" ] && add_field "Triggered by" "$INPUT_ACTOR"
        
        SHORT_SHA=$(echo "$INPUT_COMMIT_SHA" | cut -c1-8)
        add_field "Commit" "[$SHORT_SHA](https://github.com/$INPUT_REPOSITORY/commit/$INPUT_COMMIT_SHA)"
        
        [ -n "$INPUT_FHIR_SERVER_URL" ] && add_field "FHIR Server" "[Link]($INPUT_FHIR_SERVER_URL)"
        [ -n "$INPUT_KEYCLOAK_URL" ] && add_field "Keycloak" "[Link]($INPUT_KEYCLOAK_URL)"
        [ -n "$INPUT_APP_URL" ] && add_field "Proxy Smart" "[Link]($INPUT_APP_URL)"
        [ -n "$INPUT_WORKFLOW_URL" ] && add_field "Workflow" "[Actions]($INPUT_WORKFLOW_URL)"
        [ -n "$INPUT_RELEASE_URL" ] && add_field "Release" "[GitHub]($INPUT_RELEASE_URL)"
        [ -n "$FORMATTED_CHANGELOG" ] && add_field "Changelog" "$FORMATTED_CHANGELOG" false
        
        # Build payload with jq for proper JSON escaping
        PAYLOAD=$(jq -n \
          --arg title "$INPUT_TITLE" \
          --arg desc "$INPUT_DESCRIPTION" \
          --argjson color "$COLOR_DEC" \
          --arg ts "$TIMESTAMP" \
          --argjson fields "$FIELDS_JSON" \
          --arg repo "$INPUT_REPOSITORY" \
          '{
            "embeds": [{
              "title": $title,
              "description": $desc,
              "color": $color,
              "timestamp": $ts,
              "fields": $fields,
              "footer": {
                "text": $repo,
                "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
              }
            }]
          }')
        
        # Send the webhook
        HTTP_CODE=$(curl -s -o /tmp/discord-response.txt -w "%{http_code}" \
             -H "Content-Type: application/json" \
             -d "$PAYLOAD" \
             "$INPUT_WEBHOOK_URL")
        
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
          echo "Discord notification sent successfully (HTTP $HTTP_CODE)"
        else
          echo "WARNING: Discord notification returned HTTP $HTTP_CODE"
          cat /tmp/discord-response.txt 2>/dev/null || true
          # Don't fail the workflow for Discord notification issues
          exit 0
        fi

    - name: Log notification details
      shell: bash
      env:
        INPUT_NOTIFICATION_TYPE: ${{ inputs.notification-type }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_RELEASE_TYPE: ${{ inputs.release-type }}
        EMBED_COLOR: ${{ steps.color.outputs.color }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
      run: |
        echo "Discord notification sent:"
        echo "  Type: $INPUT_NOTIFICATION_TYPE"
        echo "  Title: $INPUT_TITLE"
        echo "  Color: #$EMBED_COLOR"
        echo "  Repository: $INPUT_REPOSITORY"
        if [ -n "$INPUT_VERSION" ]; then
          echo "  Version: $INPUT_VERSION"
        fi
        if [ -n "$INPUT_RELEASE_TYPE" ]; then
          echo "  Release Type: $INPUT_RELEASE_TYPE"
        fi
